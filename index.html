    html,body{background:#060e09;height:100%;overscroll-behavior:none}
    #root{height:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    @keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
    .screen-enter{animation:fadeIn .25s ease}
    .slide-enter{animation:slideIn .25s ease}
    .scale-enter{animation:scaleIn .2s ease}
    .skeleton{background:linear-gradient(90deg,#132819 25%,#1e3c27 50%,#132819 75%);background-size:400px 100%;animation:shimmer 1.5s infinite}
  </style>
