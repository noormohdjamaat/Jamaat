/* ══════════════════════════════════════════════════════
   SHA-256 HASH UTILITY (Web Crypto API — no raw storage)
══════════════════════════════════════════════════════ */
const AADHAAR_PEPPER = "jamat-platform-2025-secure-pepper";
async function sha256Hash(text) {
  const msgBuffer = new TextEncoder().encode(text + AADHAAR_PEPPER);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

const SMS = {
  async send(phone, message) {
    const num = phone.replace(/[^0-9]/g, "").slice(-10);
    if (num.length !== 10) return {
      ok: false
    };
    try {
      const res = await fetch("https://xpkfagerukqbvzgpqsmj.supabase.co/functions/v1/send-sms", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer sb_publishable_2Bxsg16faQp66irCSUolzw_rzOdOWlX"
        },
        body: JSON.stringify({
          phone: num,
          message
        })
      });
      const data = await res.json();
      return {
        ok: data.ok === true,
        data
      };
    } catch (e) {
      return {
        ok: false
      };
    }
  },
  async arrival(phone, name, loc, jamaat, pin, lang = "ur") {
    const msg = DB.buildMessage("arrival", {
      name,
      location: loc,
      jamaat,
      pincode: pin,
      time: new Date().toLocaleTimeString("en-IN")
    }, lang);
    const r = await this.send(phone, msg);
    await DB.logNotification({
      type: "arrival",
      sender_name: name,
      message: msg,
      channel: "sms",
      lang,
      location: loc,
      pincode: pin
    });
    return r;
  },
  async sos(amirPhone, famPhone, name, loc, blood, lang = "ur") {
    const msg = DB.buildMessage("sos", {
      name,
      location: loc,
      amir: JAMAAT.amir.en,
      blood: blood || "Unknown"
    }, lang);
    if (amirPhone) await this.send(amirPhone, msg);
    if (famPhone) await this.send(famPhone, msg);
    await DB.logNotification({
      type: "sos",
      sender_name: name,
      message: msg,
      channel: "sms",
      lang,
      location: loc
    });
  }
};
