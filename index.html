/* ══════════════════════════════════════════════════════
   SHA-256 HASH UTILITY (Web Crypto API — no raw storage)
══════════════════════════════════════════════════════ */
const AADHAAR_PEPPER = "jamat-platform-2025-secure-pepper";

async function sha256Hash(text) {
  const msgBuffer = new TextEncoder().encode(text + AADHAAR_PEPPER);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray  = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

/* ══════════════════════════════════════════════════════
   DB SERVICE — All backend operations in one place
   Falls back to localStorage if Supabase not configured
══════════════════════════════════════════════════════ */
const DB = {

  /* ── BLACKLIST ─────────────────────────────────── */
  async checkBlacklist(aadhaarRaw) {
    const hash = await sha256Hash(aadhaarRaw.replace(/\s/g,""));
    if (!BACKEND_READY) {
      // localStorage fallback for demo
      const list = JSON.parse(localStorage.getItem("jamat_blacklist") || "[]");
      return list.includes(hash) ? { banned: true, reason: "Demo ban (localStorage)" } : { banned: false };
    }
    const { data } = await _sb
      .from("blacklisted_identities")
      .select("reason, banned_at")
      .eq("aadhaar_hash", hash)
      .neq("severity", "lifted")
      .maybeSingle();
    return data ? { banned: true, reason: data.reason, bannedAt: data.banned_at } : { banned: false };
  },

  async addBlacklist(aadhaarRaw, reason, bannedBy) {
    const hash = await sha256Hash(aadhaarRaw.replace(/\s/g,""));
    if (!BACKEND_READY) {
      const list = JSON.parse(localStorage.getItem("jamat_blacklist") || "[]");
      list.push(hash);
      localStorage.setItem("jamat_blacklist", JSON.stringify(list));
      return { ok: true };
    }
    const { error } = await _sb.from("blacklisted_identities").insert({
      aadhaar_hash: hash, reason, banned_by: bannedBy, severity: "permanent"
    });
    return { ok: !error, error };
  },

  /* ── HEALTH PROFILE ────────────────────────────── */
  async loadHealth(userId) {
    const lsKey = `jamat_health_${userId}`;
    if (!BACKEND_READY) {
      return JSON.parse(localStorage.getItem(lsKey) || "null");
    }
    const { data } = await _sb
      .from("health_profiles")
      .select("*")
      .eq("user_id", userId)
      .maybeSingle();
    return data;
  },

  async saveHealth(userId, profile) {
    const lsKey = `jamat_health_${userId}`;
    const payload = { ...profile, user_id: userId, updated_at: new Date().toISOString() };
    if (!BACKEND_READY) {
      localStorage.setItem(lsKey, JSON.stringify(payload));
      return { ok: true };
    }
    const { error } = await _sb
      .from("health_profiles")
      .upsert(payload, { onConflict: "user_id" });
    return { ok: !error, error };
  },

  async loadJamaatHealth(jamaatId) {
    if (!BACKEND_READY) {
      // Return demo health data for all jamaat members
      return JAMAAT.members.map(m => ({
        user_id: m.id, name_en: m.en, blood_group: m.bloodGroup,
        has_medical: m.hasMedical, has_allergies: m.allergies,
        medical_summary: m.hasMedical ? "Diabetes Type 2 — diet controlled" : null,
        allergy_summary: m.allergies ? "Peanuts — carry EpiPen" : null,
      }));
    }
    const { data } = await _sb
      .from("health_profiles")
      .select("*, users(name_en, name_ur)")
      .eq("jamaat_id", jamaatId);
    return data || [];
  },

  /* ── NOTIFICATIONS ─────────────────────────────── */
  async logNotification(payload) {
    const entry = { ...payload, sent_at: new Date().toISOString() };
    // Always save to localStorage for history view
    const logs = JSON.parse(localStorage.getItem("jamat_notif_log") || "[]");
    logs.unshift(entry);
    localStorage.setItem("jamat_notif_log", JSON.stringify(logs.slice(0, 50)));

    if (!BACKEND_READY) return { ok: true };
    const { error } = await _sb.from("notification_logs").insert(entry);
    return { ok: !error };
  },

  async getNotifLogs(userId) {
    const lsLogs = JSON.parse(localStorage.getItem("jamat_notif_log") || "[]");
    if (!BACKEND_READY) return lsLogs;
    const { data } = await _sb
      .from("notification_logs")
      .select("*")
      .eq("sender_id", userId)
      .order("sent_at", { ascending: false })
      .limit(30);
    return data || lsLogs;
  },

  /* ── HUMANIZED TEMPLATE RENDERER ──────────────── */
  buildMessage(type, vars, lang = "ur") {
    const now = new Date().toLocaleString("en-IN");
    const templates = {
      arrival: {
        ur: `🌿 الحمدللہ\n${vars.name} خیریت سے ${vars.location} پہنچ گئے\nجماعت: ${vars.jamaat}\nوقت: ${vars.time || now}\nپن کوڈ: ${vars.pincode}\n\nاللہ تعالیٰ حفاظت فرمائیں 🤲`,
        en: `🌿 Alhamdulillah\n${vars.name} has safely reached ${vars.location}\nJamaat: ${vars.jamaat} · Time: ${vars.time || now}\nPincode: ${vars.pincode}\n\nMay Allah keep them safe 🤲`,
        hi: `🌿 Alhamdulillah\n${vars.name} salamat ${vars.location} pahunch gaye\nJamaat: ${vars.jamaat} · Waqt: ${vars.time || now}`,
      },
      sos: {
        ur: `🆘 فوری مدد!\n${vars.name} نے ایمرجنسی الرٹ بھیجا\n📍 ${vars.location}\n⏰ ${now}\nامیر: ${vars.amir}\n🩸 خون کا گروپ: ${vars.blood || "معلوم نہیں"}\n\nفوری رابطہ کریں!`,
        en: `🆘 EMERGENCY!\n${vars.name} triggered SOS at ${vars.location}\nTime: ${now} · Amir: ${vars.amir}\nBlood Group: ${vars.blood || "Unknown"}\nContact immediately!`,
      },
      broadcast: {
        ur: `📢 جماعت اعلان\n${vars.message}\n\nامیر: ${vars.amir}\n${now}`,
        en: `📢 Jamaat Announcement\n${vars.message}\n\nAmir: ${vars.amir}\n${now}`,
      },
      welcome: {
        ur: `السلام علیکم ${vars.name} 🌙\nآپ کا JAMAT میں خیر مقدم ہے\nعزت · حفاظت · نظام`,
        en: `Assalamu Alaikum ${vars.name} 🌙\nWelcome to JAMAT Platform\nIzzat · Hifazat · Nizaam`,
      },
    };
    return (templates[type]?.[lang]) || (templates[type]?.["en"]) || "";
  },
};

const SMS = {
  async send(phone, message) {
    const num = phone.replace(/[^0-9]/g,"").slice(-10);
    if(num.length !== 10) return {ok:false};
    try {
      const res = await fetch("https://xpkfagerukqbvzgpqsmj.supabase.co/functions/v1/send-sms", {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer sb_publishable_2Bxsg16faQp66irCSUolzw_rzOdOWlX"},
        body:JSON.stringify({phone:num,message})
      });
      const data=await res.json();
      return {ok:data.ok===true,data};
    }catch(e){return{ok:false};}
  },
  async arrival(phone,name,loc,jamaat,pin,lang="ur"){
    const msg=DB.buildMessage("arrival",{name,location:loc,jamaat,pincode:pin,time:new Date().toLocaleTimeString("en-IN")},lang);
    const r=await this.send(phone,msg);
    await DB.logNotification({type:"arrival",sender_name:name,message:msg,channel:"sms",lang,location:loc,pincode:pin});
    return r;
  },
  async sos(amirPhone,famPhone,name,loc,blood,lang="ur"){
    const msg=DB.buildMessage("sos",{name,location:loc,amir:JAMAAT.amir.en,blood:blood||"Unknown"},lang);
    if(amirPhone) await this.send(amirPhone,msg);
    if(famPhone) await this.send(famPhone,msg);
    await DB.logNotification({type:"sos",sender_name:name,message:msg,channel:"sms",lang,location:loc});
  },
};

function useMount(delay=0){
  const [v,setV]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setV(true),delay);return()=>clearTimeout(t);},[]);
  return v;
}

function useOnline(){
  const [online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);
  return online;
}

const QRComp = ({data,sz=160}) => {
  const h=data.split("").reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0)>>>0;
  const N=21,cell=sz/N;
  const fin=[[0,0],[0,14],[14,0]];
  const isFin=(r,c)=>fin.some(([fr,fc])=>r>=fr&&r<fr+7&&c>=fc&&c<fc+7);
  const on=(r,c)=>{
    const s=fin.some(([fr,fc])=>r>=fr+2&&r<fr+5&&c>=fc+2&&c<fc+5);
    return s||(!isFin(r,c)&&((h*r*31+c*17+r*c*7)%11<5));
  };
  return(
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}>
      <rect width={sz} height={sz} fill="#fff"/>
      {fin.map(([fr,fc])=>(
        <g key={`${fr}-${fc}`}>
          <rect x={fc*cell} y={fr*cell} width={7*cell} height={7*cell} fill={C.bg}/>
          <rect x={(fc+1)*cell} y={(fr+1)*cell} width={5*cell} height={5*cell} fill="#fff"/>
          <rect x={(fc+2)*cell} y={(fr+2)*cell} width={3*cell} height={3*cell} fill={C.bg}/>
        </g>
      ))}
      {Array.from({length:N},(_,r)=>Array.from({length:N},(_,c)=>
        (!isFin(r,c)&&on(r,c))?<rect key={`${r}-${c}`} x={c*cell} y={r*cell} width={cell} height={cell} fill={C.bg}/>:null
      ))}
    </svg>
  );
};

/* Toast notification system */
function Toast({msg,type="success",onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  const colors={success:C.greenBr,error:C.redHi,info:C.gold};
  return(
    <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:999,background:C.card,border:`1.5px solid ${colors[type]}`,borderRadius:12,padding:"11px 20px",color:C.cream,fontSize:13,fontWeight:600,whiteSpace:"nowrap",boxShadow:`0 8px 28px #00000080`,animation:"toastIn .3s ease",display:"flex",alignItems:"center",gap:8}}>

      {msg}
    </div>
  );
}

  const sendOTP=async ()=>{
    const clean=num.replace(/\s/g,"");
    if(clean.length<12){setErr("Enter valid 12-digit Aadhaar number");return;}
    setErr("");setLoading(true);
    try {
      const result = await DB.checkBlacklist(clean);
      if(result.banned){setLoading(false);setBlocked(result);return;}
    } catch(e){ console.warn("Blacklist check failed, proceeding:",e); }
    setTimeout(()=>{setLoading(false);setStep("otp");},400);

    const n=[...otp];n[i]=v;setOtp(n);

  };
  const otpKey=(i,e)=>{if(e.key==="Backspace"&&!otp[i]&&i>0)refs.current[i-1]?.focus();};

    if(otp.join("").length<6){setErr("Enter 6-digit OTP");return;}

          <div style={{color:C.gold,fontSize:12,fontWeight:700,direction:"rtl",marginBottom:14}}>خاندانی رابطہ</div>
          <Inp label="Full Name" val={name} set={setName} ph="e.g. Fatima Ahmed"/>
          <Inp label="Mobile Number" val={phone} set={setPhone} ph="+91 98765 43210" type="tel" kb="tel"/>
          <div style={{marginBottom:6}}>
            <div style={{color:C.creamDi,fontSize:13,marginBottom:8,fontWeight:500}}>Relation</div>

              {["Wife","Husband","Father","Mother","Son","Daughter","Brother","Sister"].map(r=>(
                <button key={r} onClick={()=>setRel(r)} style={{padding:"6px 13px",borderRadius:8,border:`1.5px solid ${rel===r?C.gold:C.border}`,background:rel===r?C.goldDim:C.surface,color:rel===r?C.goldHi:C.creamDi,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>{r}</button>
              ))}
            </div>
          </div>
        </Cd>
        {ok&&(
          <Cd s={{marginBottom:18,borderColor:C.green,background:"#041808"}}>
            <div style={{color:C.greenBr,fontSize:12,fontWeight:700,marginBottom:10}}>📱 وہ پیغام جو انہیں ملے گا (Urdu)</div>
            <div style={{background:C.surface,borderRadius:8,padding:12,direction:"rtl",lineHeight:1.9,fontSize:12,color:C.cream,whiteSpace:"pre-line"}}>{urduMsg}</div>
            <div style={{color:C.txtDi,fontSize:11,marginTop:8,direction:"ltr"}}>Sent to: <strong style={{color:C.cream}}>{name}</strong> ({rel}) via SMS + WhatsApp</div>
          </Cd>
        )}
        <Btn fn={()=>ok&&onDone({name,phone,rel})} v="gold" dis={!ok} ch="✓ Save & Continue to Dashboard"/>
        <div style={{textAlign:"center",marginTop:14,color:C.txtDi,fontSize:11}}>Required for all users. Cannot be skipped.</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   SCREEN: HEALTH PROFILE
══════════════════════════════════════════════════════ */
function HealthScreen({user,go,showToast}){
  const isAmir=user.role==="amir";
  const [editing,setEditing]=useState(false);
  const [bg,setBg]=useState(user.bloodGroup||"O+");
  const [conditions,setConditions]=useState("");
  const [meds,setMeds]=useState("");
  const [allergies,setAllergies]=useState("");
  const [notes,setNotes]=useState("");
  const [visibleToAmir,setVisibleToAmir]=useState(true);
  const [dbLoading,setDbLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [jamaatHealth,setJamaatHealth]=useState([]);
  const bgs=["A+","A-","B+","B-","O+","O-","AB+","AB-"];

  /* Load from backend on mount */
  useEffect(()=>{
    (async()=>{
      setDbLoading(true);
      if(isAmir){
        const data=await DB.loadJamaatHealth(JAMAAT.id);
        setJamaatHealth(data||[]);
        // Log audit access
        await DB.logNotification({type:"audit",sender_id:user.id,sender_name:user.en,
          message:`Amir ${user.en} viewed health profiles for ${JAMAAT.en}`,channel:"audit",lang:"en"});
      } else {
        const data=await DB.loadHealth(user.id);
        if(data){
          setBg(data.blood_group||user.bloodGroup||"O+");
          setConditions(data.medical_conditions||"");
          setMeds(data.medications||"");
          setAllergies(data.allergies||"");
          setNotes(data.emergency_notes||"");
          setVisibleToAmir(data.visible_to_amir!==false);
        }
      }
      setDbLoading(false);
    })();
  },[user.id]);

  const save=async()=>{
    setSaving(true);
    const result=await DB.saveHealth(user.id,{
      blood_group:bg, medical_conditions:conditions,
      medications:meds, allergies:allergies,
      emergency_notes:notes, visible_to_amir:visibleToAmir,
      jamaat_id:JAMAAT.id,
    });
    setSaving(false);
    setEditing(false);
    showToast(result.ok?"✓ Health profile saved to "+( BACKEND_READY?"Supabase":"local storage"):"Save failed — check console","success");
  };

  if(isAmir){
    const members = jamaatHealth.length>0 ? jamaatHealth : JAMAAT.members.map(m=>({
      user_id:m.id, name_en:m.en, name_ur:m.name, blood_group:m.bloodGroup,
      has_medical:m.hasMedical, has_allergies:m.allergies,
      medical_summary:m.hasMedical?"Diabetes Type 2 — monitor meals":null,
      allergy_summary:m.allergies?"Peanuts — carry EpiPen":null,
    }));
    return(
      <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
        <BackBtn fn={()=>go("dashboard")} label="Dashboard"/>
        <div style={{padding:"14px 0 16px"}}>
          <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>صحت کا ریکارڈ</div>
          <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Members' Health — Amir View</div>
          <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>Confidential · Amir-only · Every access is audit-logged {BACKEND_READY?"→ Supabase":"→ local"}</div>
        </div>
        <Cd s={{marginBottom:14,borderColor:C.amber,background:"#1a0e04"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:20}}>⚠️</span>
            <div style={{color:C.amberHi,fontSize:12,fontWeight:600}}>Access recorded: {user.en} · {new Date().toLocaleString()}</div>
          </div>
        </Cd>
        {dbLoading?<Spinner/>:members.map((m,idx)=>(
          <Cd key={m.user_id||idx} s={{marginBottom:10,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:(m.has_medical||m.has_allergies||m.hasMedical||m.allergies)?10:0}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{position:"relative"}}><Av name={m.name_en||m.en} size={38}/></div>
                <div>
                  <div style={{color:C.cream,fontSize:13,fontWeight:700}}>{m.name_en||m.en}</div>
                  <div style={{color:C.gold,fontSize:11,direction:"rtl",fontFamily:"serif"}}>{m.name_ur||m.name||""}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                <Bdg v="teal" ch={`🩸 ${m.blood_group||m.bloodGroup||"?"}`}/>
                {(m.has_medical||m.hasMedical)&&<Bdg v="amber" ch="⚕ Medical"/>}
                {(m.has_allergies||m.allergies)&&<Bdg v="red" ch="⚠ Allergy"/>}
              </div>
            </div>
            {(m.has_medical||m.has_allergies||m.hasMedical||m.allergies)&&(
              <div style={{padding:10,background:C.surface,borderRadius:8,fontSize:12}}>
                {(m.medical_summary||m.has_medical)&&<div style={{color:C.creamDi,marginBottom:4}}>⚕ <strong style={{color:C.cream}}>Condition:</strong> {m.medical_summary||"See full profile"}</div>}
                {(m.allergy_summary||m.has_allergies)&&<div style={{color:C.creamDi}}>⚠ <strong style={{color:C.cream}}>Allergy:</strong> {m.allergy_summary||"See full profile"}</div>}
              </div>
            )}
          </Cd>
        ))}
      </div>
    );
  }

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("dashboard")} label="Dashboard"/>
      <div style={{padding:"14px 0 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>میری صحت</div>
          <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Health Profile</div>
          <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>Encrypted · Visible only to Amir · {BACKEND_READY?"Supabase DB":"localStorage"}</div>
        </div>
        {!dbLoading&&<button onClick={()=>setEditing(!editing)} style={{background:editing?C.goldDim:C.surface,border:`1.5px solid ${editing?C.gold:C.border}`,borderRadius:9,padding:"7px 14px",color:editing?C.goldHi:C.creamDi,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
          {editing?"Cancel":"Edit"}
        </button>}
      </div>

      <Cd s={{marginBottom:14,borderColor:C.green,background:"#031408"}}>
        <div style={{display:"flex",gap:10}}>
          <span style={{fontSize:18}}>🔒</span>
          <div style={{fontSize:12,color:C.creamDi,lineHeight:1.7}}>Encrypted at rest · Amir-only access · Every view is audit-logged</div>
        </div>
      </Cd>

      {dbLoading?<Spinner/>:(
        <>
          <Cd s={{marginBottom:12}}>
            <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:12}}>🩸 Blood Group</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {bgs.map(b=>(
                <button key={b} onClick={()=>editing&&setBg(b)}
                  style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${bg===b?C.tealHi:C.border}`,background:bg===b?"#041e1e":C.surface,color:bg===b?C.tealHi:C.creamDi,fontSize:13,fontWeight:700,cursor:editing?"pointer":"default",fontFamily:"inherit",transition:"all .2s"}}>{b}</button>
              ))}
            </div>
          </Cd>

          {editing?(
            <>
              <Inp label="Medical Conditions (encrypted)" val={conditions} set={setConditions} ph="e.g. Diabetes Type 2, Hypertension…"/>
              <Inp label="Current Medications (encrypted)" val={meds} set={setMeds} ph="e.g. Metformin 500mg twice daily…"/>
              <Inp label="Allergies (encrypted)" val={allergies} set={setAllergies} ph="e.g. Peanuts, Penicillin…"/>
              <Inp label="Emergency Notes (encrypted)" val={notes} set={setNotes} ph="Any special instructions for your Amir…"/>
              <Cd s={{marginBottom:16,borderColor:C.green}}>
                <label style={{display:"flex",gap:12,alignItems:"center",cursor:"pointer"}} onClick={()=>setVisibleToAmir(!visibleToAmir)}>
                  <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${visibleToAmir?C.greenBr:C.borderBr}`,background:visibleToAmir?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
                    {visibleToAmir&&<svg width="13" height="13" viewBox="0 0 14 14"><path d="M2.5 7L6 10.5L11.5 4" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <span style={{color:C.creamDi,fontSize:12,lineHeight:1.6}}>Allow Amir to view this health data during Jamaat</span>
                </label>
              </Cd>
              {saving?<Spinner/>:<Btn fn={save} v="gold" ch={`💾 Save to ${BACKEND_READY?"Supabase Database":"Local Storage"}`}/>}
            </>
          ):(
            <Cd s={{padding:16}}>
              <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:12}}>Saved Profile {BACKEND_READY&&<span style={{color:C.greenBr,fontSize:10}}>● Live DB</span>}</div>
              {[
                ["Blood Group",bg,"🩸"],
                ["Medical Conditions",conditions||"None recorded","⚕"],
                ["Medications",meds||"None","💊"],
                ["Allergies",allergies||"None","⚠️"],
                ["Emergency Notes",notes||"None","📝"],
                ["Visible to Amir",visibleToAmir?"Yes — Amir can view":"No — Hidden","🔒"],
              ].map(([k,v,ic])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"9px 0",borderTop:`1px solid ${C.border}`}}>
                  <span style={{color:C.creamDi,fontSize:12,display:"flex",gap:6,alignItems:"center"}}><span>{ic}</span> {k}</span>
                  <span style={{color:C.cream,fontSize:12,fontWeight:600,maxWidth:"55%",textAlign:"right"}}>{v}</span>
                </div>
              ))}
            </Cd>
          )}
        </>
      )}
    </div>
  );
}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const { useState, useEffect, useRef, useCallback } = React;
function SOS({user,onBack}){
  const [phase,setPhase]=useState("idle");
  const [cd,setCd]=useState(3);
  const holdRef=useRef(),cdRef=useRef();

  const startHold=()=>{
    if(phase!=="idle")return;
    setPhase("holding");setCd(3);
    cdRef.current=setInterval(()=>setCd(p=>{if(p<=1){clearInterval(cdRef.current);return 0;}return p-1;}),1000);
    holdRef.current=setTimeout(async()=>{
      setPhase("sent");
      SMS.sos(JAMAAT.amir.phone,user.family?.phone||'',user.en,'Current Location',user.bloodGroup||'Unknown',user.lang||'ur');
      // Log SOS
      const msg = DB.buildMessage("sos",{
        name:user.en, location:"Pune Markaz (18.52°N, 73.86°E)",
        amir:JAMAAT.amir.en, blood:user.bloodGroup||"Unknown",
      }, user.lang||"ur");
      await DB.logNotification({
        type:"sos", sender_id:user.id, sender_name:user.en,
        message:msg, channel:"sms+push", lang:user.lang||"ur",
        location:"Pune Markaz", jamaat_id:JAMAAT.id,
        amir_id:JAMAAT.id, family_phone:user.family?.phone||"",
      });
    },3100);
  };
  const cancel=()=>{
    if(phase!=="holding")return;
    clearTimeout(holdRef.current);clearInterval(cdRef.current);
    setPhase("idle");setCd(3);
  };

  const sosMsg=renderTemplate(NOTIF_TEMPLATES.sos.ur,{
    name:user.en,location:"Pune Markaz (18.52°N, 73.86°E)",
    time:new Date().toLocaleTimeString(),amir:JAMAAT.amir.en
  });

  return(
    <div style={{position:"fixed",inset:0,background:phase==="sent"?"#160000":phase==="holding"?"#1a0404":C.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:24,zIndex:200,transition:"background .4s"}}>

/* ══════════════════════════════════════════════════════

function LocationUpdate({user,go,showToast}){
  const [loc,setLoc]=useState("");
  const [pin,setPin]=useState("");
  const [lang,setLang]=useState("ur");
  const [sent,setSent]=useState(false);
  const [loading,setLoading]=useState(false);
  const [detecting,setDetecting]=useState(false);
  const presets=["Mumbai Markaz","Pune Markaz","Nashik Markaz","Aurangabad Markaz","Nagpur Markaz","Delhi Markaz","Bhopal Markaz"];
  const ok=loc.trim().length>=2&&pin.replace(/\D/g,"").length===6;

  const detectGeo=()=>{
    setDetecting(true);
    setTimeout(()=>{setDetecting(false);setLoc("Pune Markaz");setPin("411001");showToast("Location auto-detected via GPS","success");},2000);
  };

  const tpl=renderTemplate(NOTIF_TEMPLATES.arrival[lang],{
    name:JAMAAT.members[0].en,location:loc||"[Location]",
    jamaat:JAMAAT.en,time:new Date().toLocaleTimeString(),pincode:pin||"——"
  });

  const send=async()=>{
    setLoading(true);
    const msg = DB.buildMessage("arrival",{
      name: JAMAAT.members[0].en, location: loc,
      jamaat: JAMAAT.en, pincode: pin,
    }, lang);
    await DB.logNotification({
      type:"arrival", sender_id:user.id, sender_name:user.en,
      message:msg, channel:"whatsapp", lang,
      location:loc, pincode:pin, jamaat_id:JAMAAT.id,
    });
    setLoading(false);
    setSent(true);
  };

  if(sent) return(
    <div style={{padding:"24px 14px",maxWidth:460,margin:"0 auto",textAlign:"center"}}>
      <BackBtn fn={()=>{setSent(false);go("dashboard");}} label="Dashboard"/>
      <div style={{paddingTop:40}}>
        <div style={{fontSize:56,marginBottom:16}}>✅</div>
        <div style={{color:C.greenBr,fontSize:22,fontWeight:700}}>Location Updated!</div>
        <div style={{color:C.creamDi,fontSize:13,marginTop:8}}>All 6 family contacts notified</div>
        <Cd s={{marginTop:20,textAlign:"left",borderColor:C.green}}>
          <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:10,direction:lang==="ur"?"rtl":"ltr"}}>پیغام بھیجا گیا</div>
          <div style={{background:C.surface,borderRadius:8,padding:12,color:C.cream,fontSize:12,lineHeight:1.9,direction:lang==="ur"?"rtl":"ltr",whiteSpace:"pre-line"}}>{tpl}</div>
          <div style={{color:C.txtDi,fontSize:11,marginTop:10}}>📱 SMS + WhatsApp · {new Date().toLocaleString()}</div>
        </Cd>
        <Btn fn={()=>setSent(false)} v="outline" s={{marginTop:20}} ch="Update Again"/>
      </div>
    </div>
  );

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("dashboard")} label="Dashboard"/>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>مقام کی تجدید</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Update Jamaat Location</div>
        <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>All family contacts notified via SMS + WhatsApp</div>
      </div>

      {/* Language */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["ur","اردو"],["en","English"]].map(([l,label])=>(
          <button key={l} onClick={()=>setLang(l)} style={{flex:1,padding:"9px",borderRadius:9,border:`1.5px solid ${lang===l?C.gold:C.border}`,background:lang===l?C.goldDim:C.surface,color:lang===l?C.goldHi:C.creamDi,fontFamily:"inherit",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s"}}>{label}</button>
        ))}
      </div>

      {/* Geo detect */}
      <button onClick={detectGeo} disabled={detecting}
        style={{width:"100%",marginBottom:14,padding:"12px",border:`1.5px solid ${C.teal}`,borderRadius:10,background:"#041e1e",color:C.tealHi,fontSize:13,fontWeight:700,cursor:detecting?"wait":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {detecting?<Spinner size={16}/>:<span>📡</span>}
        {detecting?"Detecting GPS…":"Auto-detect Current Location (GPS)"}
      </button>

      <div style={{color:C.creamDi,fontSize:12,marginBottom:10}}>Or select preset:</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
        {presets.map(p=>(
          <button key={p} onClick={()=>setLoc(p)} style={{padding:"6px 13px",borderRadius:8,border:`1.5px solid ${loc===p?C.gold:C.border}`,background:loc===p?C.goldDim:C.surface,color:loc===p?C.goldHi:C.creamDi,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{p}</button>
        ))}
      </div>

      <Inp label="Location Name" val={loc} set={setLoc} ph="e.g. Pune Markaz"/>
      <Inp label="Pincode" val={pin} set={v=>setPin(v.replace(/\D/g,"").slice(0,6))} ph="411001" max={6} kb="numeric"/>

      {ok&&(
        <Cd s={{marginBottom:16,borderColor:C.goldDim}}>
          <div style={{color:C.creamDi,fontSize:11,marginBottom:8}}>Preview notification (to each family contact):</div>
          <div style={{background:C.surface,borderRadius:8,padding:12,color:C.cream,fontSize:12,lineHeight:1.9,direction:lang==="ur"?"rtl":"ltr",whiteSpace:"pre-line"}}>{tpl}</div>
          <div style={{color:C.greenBr,fontSize:11,marginTop:8}}>📱 6 family contacts will receive this via {lang==="ur"?"Urdu":"English"}</div>
        </Cd>
      )}

      {loading?<Spinner/>:<Btn fn={send} v="gold" dis={!ok} ch="📍 Update Location & Notify Families"/>}
    </div>
  );
}

function Ledger({user,go,ledger}){
  const jamaats=ledger.filter(l=>l.type==="jamaat");

  const avgScore=Math.round(jamaats.filter(l=>l.score).reduce((a,l)=>a+l.score,0)/jamaats.filter(l=>l.score).length);
  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>عمر بھر کا ریکارڈ</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Lifetime Ledger</div>
        <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>Immutable · Hash-chained · Cannot be edited</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
        {[[jamaats.length,"Jamaats","🧭"],[evts.length,"Events","🎪"],[totalDays,"Days","📅"],[isNaN(avgScore)?0:avgScore,"Avg Score","⭐"]].map(([v,l,ic])=>(
          <Cd key={l} s={{textAlign:"center",padding:12}}>
            <div style={{fontSize:16,marginBottom:2}}>{ic}</div>
            <div style={{color:C.gold,fontSize:18,fontWeight:800}}>{v}</div>
            <div style={{color:C.txtDi,fontSize:10,marginTop:2}}>{l}</div>
          </Cd>
        ))}
      </div>

      {ledger.map((l,i)=>(
        <Cd key={l.id} s={{marginBottom:11,borderLeft:`3px solid ${l.type==="jamaat"?C.gold:C.greenBr}`}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <Bdg v={l.type==="jamaat"?"gold":"green"} ch={l.type==="jamaat"?"🧭 Jamaat":"🎪 Event"}/>
            <Bdg v={l.status==="completed"?"green":"blue"} ch={l.status==="completed"?"✓ Completed":"✓ Attended"}/>
          </div>
          <div style={{color:C.gold,fontSize:14,fontWeight:700,direction:"rtl",marginBottom:2}}>{l.name}</div>
          <div style={{color:C.creamDi,fontSize:12,marginBottom:8}}>{l.en}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{color:C.txtDi,fontSize:11}}>📅 {l.start} → {l.end} · {l.days}d</div>
            {l.score&&<div style={{background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:999,padding:"2px 10px",color:C.goldHi,fontSize:12,fontWeight:700}}>⭐ {l.score}/100</div>}
          </div>
          {/* Hash chain indicator */}
          <div style={{display:"flex",alignItems:"center",gap:6,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.greenBr} strokeWidth="2.5"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
            <span style={{color:C.txtDi,fontSize:10,fontFamily:"monospace"}}>#{i+1} · hash: {l.hash}…</span>
            <span style={{color:C.greenBr,fontSize:10,marginLeft:"auto"}}>✓ Intact</span>

        </Cd>
      ))}

      <Cd s={{padding:12,textAlign:"center",borderColor:C.goldDim}}>

    </div>
  );
}

/* ══════════════════════════════════════════════════════
   📷 QR SCANNER — Fixed with jsQR
══════════════════════════════════════════════════════ */
function QRScanner({go,showToast}){
  const [scanning,setScanning]=React.useState(false);
  const [result,setResult]=React.useState(null);
  const [err,setErr]=React.useState("");
  const videoRef=React.useRef();
  const canvasRef=React.useRef();
  const streamRef=React.useRef();
  const rafRef=React.useRef();

  const start=async()=>{
    setErr("");setResult(null);
    try{
      if(!navigator.mediaDevices?.getUserMedia){setErr("Camera not supported in this browser");return;}
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=stream;
      videoRef.current.srcObject=stream;
      await videoRef.current.play();
      setScanning(true);
      rafRef.current=requestAnimationFrame(tick);
    }catch(e){
      if(e.name==="NotAllowedError")setErr("Camera permission denied. Please allow camera access.");
      else if(e.name==="NotFoundError")setErr("No camera found on this device.");
      else setErr("Camera error: "+e.message);
    }
  };

  const tick=()=>{
    const v=videoRef.current, c=canvasRef.current;
    if(!v||!c||v.readyState<2){rafRef.current=requestAnimationFrame(tick);return;}
    c.width=v.videoWidth;c.height=v.videoHeight;
    const ctx=c.getContext("2d",{willReadFrequently:true});
    ctx.drawImage(v,0,0);
    try{
      const img=ctx.getImageData(0,0,c.width,c.height);
      if(typeof jsQR!=="undefined"){
        const code=jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
        if(code){stop();setResult(code.data);process(code.data);return;}
      }
    }catch(e){}
    rafRef.current=requestAnimationFrame(tick);
  };

  const stop=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(rafRef.current){cancelAnimationFrame(rafRef.current);}
    setScanning(false);
  };

  const process=(data)=>{
    let msg="QR Code scanned!";
    if(data.includes("JAMAT")) msg="✓ Valid JAMAT Pass";
    else if(data.startsWith("http")) msg="URL: "+data.slice(0,30)+"...";
    showToast(msg,"success");
    DB.logNotification({type:"audit",sender_name:"Scanner",message:"QR scanned: "+data.slice(0,50),channel:"app",lang:"en"});
  };

  React.useEffect(()=>()=>{stop();},[]);

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>{stop();go("dashboard");}} label="Dashboard"/>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>QR اسکینر</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>QR Scanner</div>
      </div>

      {/* Camera View */}
      <div style={{position:"relative",marginBottom:14,borderRadius:16,overflow:"hidden",border:`1px solid ${scanning?C.gold:C.border}`,background:"#000",minHeight:260}}>
        <video ref={videoRef} style={{width:"100%",height:260,objectFit:"cover",display:"block"}} playsInline muted autoPlay/>
        <canvas ref={canvasRef} style={{display:"none"}}/>
        {!scanning&&(
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#060e09",gap:12}}>
            <div style={{fontSize:56}}>📷</div>
            <div style={{color:C.creamDi,fontSize:13}}>Camera ready to scan</div>
          </div>
        )}
        {scanning&&(
          <>
            {/* Corner markers */}
            {[{top:16,left:16},{top:16,right:16},{bottom:16,left:16},{bottom:16,right:16}].map((pos,i)=>(
              <div key={i} style={{position:"absolute",...pos,width:28,height:28,border:`3px solid ${C.gold}`,
                borderRight:pos.right!==undefined?"3px solid "+C.gold:"none",
                borderBottom:pos.bottom!==undefined?"3px solid "+C.gold:"none",
                borderLeft:pos.left!==undefined?"3px solid "+C.gold:"none",
                borderTop:pos.top!==undefined?"3px solid "+C.gold:"none",
                borderRadius:4
              }}/>
            ))}
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:180,height:180,border:"1px solid "+C.gold+"44",borderRadius:12}}/>
            <div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",color:C.goldHi,fontSize:12,background:"#060e0988",padding:"4px 12px",borderRadius:999}}>Scanning...</div>
          </>
        )}
      </div>

      {err&&<Cd s={{marginBottom:12,borderColor:C.red,background:C.redBg}}><div style={{color:C.redHi,fontSize:13}}>⚠ {err}</div></Cd>}

      {result&&(
        <Cd s={{marginBottom:12,borderColor:C.greenBr,background:"#031408"}}>
          <div style={{color:C.greenBr,fontSize:14,fontWeight:700,marginBottom:8}}>✓ QR Scanned!</div>
          <div style={{color:C.creamDi,fontSize:11,fontFamily:"monospace",wordBreak:"break-all",lineHeight:1.5}}>{result.slice(0,100)}{result.length>100?"...":""}</div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <Btn fn={()=>{setResult(null);start();}} v="outline" s={{flex:1,padding:10,fontSize:12}} ch="Scan Again"/>
            {result.startsWith("http")&&<Btn fn={()=>window.open(result,"_blank")} v="gold" s={{flex:1,padding:10,fontSize:12}} ch="Open URL"/>}
          </div>
        </Cd>
      )}

      {!scanning
        ?<Btn fn={start} v="gold" ch="📷 Start Scanning"/>
        :<Btn fn={stop} v="danger" ch="⏹ Stop"/>
      }

      <Cd s={{marginTop:12,padding:12}}>
        <div style={{color:C.txtDi,fontSize:11,lineHeight:1.8}}>
          💡 JAMAT QR Pass scan karo event entry ke liye.<br/>
          Camera front/back automatically select hoga.
        </div>
      </Cd>
    </div>
  );
}

/* ══════════════════════════════════════════════════════

function IslamicScreen({go,user}){
  const [prayers,setPrayers]=useState(null);
  const [tab,setTab]=useState("prayers");
  const [qibla,setQibla]=useState(null);
  const [loading,setLoading]=useState(true);
  const HADITHS=[
    {ar:"إنَّمَا الأعمالُ بالنِّيَّاتِ",en:"Actions are judged by intentions.",src:"Bukhari 1"},
    {ar:"خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ",en:"Best of you is one who learns and teaches Quran.",src:"Bukhari 5027"},
    {ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ",en:"None of you truly believes until he loves for his brother what he loves for himself.",src:"Bukhari 13"},
    {ar:"يَسِّرُوا وَلَا تُعَسِّرُوا",en:"Make things easy, do not make them difficult.",src:"Bukhari 69"},
    {ar:"الدِّينُ النَّصِيحَةُ",en:"Religion is sincerity.",src:"Muslim 55"},
    {ar:"مَنْ كَظَمَ غَيْظًا",en:"Whoever suppresses his anger, Allah will fill his heart with peace.",src:"Abu Dawud"},
    {ar:"صِلُوا أَرْحَامَكُمْ",en:"Maintain your family ties.",src:"Bukhari 5988"},
  ];
  const today=HADITHS[new Date().getDate()%HADITHS.length];
  useEffect(()=>{
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(async pos=>{
        try{
          const {latitude:lat,longitude:lng}=pos.coords;
          const dLng=(39.8579-lng)*Math.PI/180;
          const la1=lat*Math.PI/180,la2=21.3891*Math.PI/180;
          const y=Math.sin(dLng)*Math.cos(la2);
          const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLng);
          setQibla({bearing:Math.round((Math.atan2(y,x)*180/Math.PI+360)%360),lat,lng});
          const r=await fetch("https://api.aladhan.com/v1/timings?latitude="+lat+"&longitude="+lng+"&method=1");
          const d=await r.json();
          if(d.code===200)setPrayers(d.data.timings);
        }catch(e){}
        setLoading(false);
      },()=>{setPrayers({Fajr:"05:15",Sunrise:"06:45",Dhuhr:"12:30",Asr:"15:45",Maghrib:"19:10",Isha:"20:30"});setQibla({bearing:292});setLoading(false);});
    }else{setPrayers({Fajr:"05:15",Sunrise:"06:45",Dhuhr:"12:30",Asr:"15:45",Maghrib:"19:10",Isha:"20:30"});setQibla({bearing:292});setLoading(false);}
  },[]);
  const pList=[{k:"Fajr",ur:"فجر",ic:"🌙"},{k:"Sunrise",ur:"طلوع",ic:"🌅"},{k:"Dhuhr",ur:"ظہر",ic:"☀️"},{k:"Asr",ur:"عصر",ic:"🌤️"},{k:"Maghrib",ur:"مغرب",ic:"🌇"},{k:"Isha",ur:"عشاء",ic:"⭐"}];
  return(
    <div style={{padding:"0 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <div style={{padding:"20px 6px 14px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>اسلامی خدمات</div>
        <div style={{color:C.cream,fontSize:22,fontWeight:800}}>Islamic Features</div>
      </div>
      <Cd s={{marginBottom:14,textAlign:"center",borderColor:C.goldDim,background:`linear-gradient(135deg,${C.card},#0a1810)`}}>
        <div style={{color:C.gold,fontSize:18,fontFamily:"serif",direction:"rtl",lineHeight:1.9}}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
      </Cd>
      <div style={{display:"flex",background:C.surface,borderRadius:12,padding:4,marginBottom:14,gap:3}}>
        {[["prayers","🕌 Namaz"],["hadith","📖 Hadith"],["qibla","🧭 Qibla"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px 4px",borderRadius:9,border:"none",background:tab===t?C.gold:"transparent",color:tab===t?C.bg:C.creamDi,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>{l}</button>
        ))}
      </div>
      {tab==="prayers"&&(
        <>
          {loading?[1,2,3,4,5,6].map(i=><div key={i} style={{height:52,borderRadius:12,marginBottom:8,background:C.surface}}/>):(
            pList.map(p=>{
              const now=new Date();
              const [h,m]=(prayers?.[p.k]||"0:0").split(":");
              const pt=new Date();pt.setHours(+h,+m,0);
              const past=pt<now;
              const isNext=!past&&pList.findIndex(x=>x.k===p.k)===pList.findIndex(x=>{const[xh,xm]=(prayers?.[x.k]||"0:0").split(":");const t=new Date();t.setHours(+xh,+xm,0);return t>now;});
              return(
                <Cd key={p.k} s={{marginBottom:8,padding:"12px 16px",borderColor:isNext?C.gold:C.border,background:isNext?C.goldDim:C.card,opacity:past?0.6:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:20}}>{p.ic}</span>
                      <div>
                        <div style={{color:isNext?C.goldHi:C.cream,fontSize:13,fontWeight:700}}>{p.k}</div>
                        <div style={{color:C.gold,fontSize:12,direction:"rtl",fontFamily:"serif"}}>{p.ur}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:isNext?C.goldHi:past?C.txtDi:C.cream,fontSize:18,fontWeight:800,fontFamily:"monospace"}}>{prayers?.[p.k]||"--:--"}</div>
                      {isNext&&<div style={{color:C.goldHi,fontSize:10}}>▶ NEXT</div>}
                    </div>
                  </div>
                </Cd>
              );
            })
          )}
        </>
      )}
      {tab==="hadith"&&(
        <Cd s={{borderColor:C.goldDim,background:`linear-gradient(160deg,${C.card},#0a1810)`}}>
          <div style={{color:C.gold,fontSize:11,letterSpacing:1,marginBottom:10}}>📖 HADITH OF THE DAY</div>
          <div style={{color:C.gold,fontSize:16,direction:"rtl",fontFamily:"serif",lineHeight:1.9,marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>{today.ar}</div>
          <div style={{color:C.cream,fontSize:13,lineHeight:1.8,marginBottom:8,fontStyle:"italic"}}>"{today.en}"</div>
          <div style={{color:C.txtDi,fontSize:11}}>{today.src}</div>
        </Cd>
      )}
      {tab==="qibla"&&(
        <Cd s={{textAlign:"center"}}>
          <div style={{color:C.gold,fontSize:13,fontWeight:700,marginBottom:16}}>🧭 Qibla Direction</div>
          {loading?<Spinner/>:(

              <div style={{position:"relative",width:180,height:180,margin:"0 auto 16px",border:`2px solid ${C.gold}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"#031408"}}>

                ))}
                <div style={{position:"absolute",width:4,height:76,background:`linear-gradient(${C.goldHi},${C.gold})`,borderRadius:2,transformOrigin:"bottom center",transform:`rotate(${(qibla?.bearing||292)-180}deg)`,bottom:"50%",left:"calc(50% - 2px)",boxShadow:`0 0 8px ${C.gold}`}}/>
                <div style={{position:"absolute",width:10,height:10,borderRadius:"50%",background:C.gold}}/>
              </div>
              <div style={{color:C.gold,fontSize:32,fontWeight:900,marginBottom:4}}>{qibla?.bearing||292}°</div>
              <div style={{color:C.creamDi,fontSize:12}}>from North · {qibla?.lat?"GPS detected":"Default: Mumbai"}</div>

  );

/* ══════════════════════════════════════════════════════
   🕌 NAMAZ ATTENDANCE SCREEN
══════════════════════════════════════════════════════ */
function AttendanceScreen({user,go,showToast}){
  const prayers=["Fajr","Ishraq","Zuhr","Asr","Maghrib","Isha"];
  const today=new Date().toISOString().split("T")[0];
  const [att,setAtt]=useState(()=>JSON.parse(localStorage.getItem("jamat_att_"+today)||"{}"));
  const [saving,setSaving]=useState(false);
  const week=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().split("T")[0];}).reverse();
  const weekData=week.map(d=>{const a=JSON.parse(localStorage.getItem("jamat_att_"+d)||"{}");return{date:d,count:prayers.filter(p=>a[p]).length,day:new Date(d).toLocaleDateString("en",{weekday:"short"})};});
  const toggle=p=>setAtt(a=>({...a,[p]:!a[p]}));
  const save=async()=>{setSaving(true);localStorage.setItem("jamat_att_"+today,JSON.stringify(att));if(BACKEND_READY)await _sb.from("attendance").upsert({user_id:user.id,date:today,...att,updated_at:new Date().toISOString()}).catch(()=>{});setSaving(false);showToast("✓ Attendance saved!","success");};
  const done=prayers.filter(p=>att[p]).length;
  return(
    <div style={{padding:"0 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <div style={{padding:"20px 6px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>نماز حاضری</div><div style={{color:C.cream,fontSize:22,fontWeight:800}}>Attendance</div></div>
        <div style={{textAlign:"right"}}><div style={{color:C.gold,fontSize:28,fontWeight:900}}>{Math.round(done/prayers.length*100)}%</div><div style={{color:C.txtDi,fontSize:10}}>Today</div></div>
      </div>
      <Cd s={{marginBottom:12,padding:10}}>
        <div style={{display:"flex",gap:6,overflowX:"auto"}}>
          {weekData.map(d=>(
            <div key={d.date} style={{flexShrink:0,textAlign:"center",minWidth:42}}>
              <div style={{fontSize:10,color:C.txtDi,marginBottom:4}}>{d.day}</div>
              <div style={{width:36,height:36,borderRadius:8,background:d.count===6?C.goldDim:d.count>0?C.surface:C.bg,border:`1.5px solid ${d.count===6?C.gold:d.count>0?C.border:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",color:d.count===6?C.gold:C.creamDi,fontSize:d.count===6?16:13,fontWeight:700,margin:"0 auto"}}>{d.count===6?"⭐":d.count||"·"}</div>
            </div>
          ))}
        </div>
      </Cd>
      <Cd s={{marginBottom:12}}>
        {prayers.map((p,i)=>(
          <div key={p} onClick={()=>toggle(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderTop:i?`1px solid ${C.border}`:"none",cursor:"pointer",userSelect:"none"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:26,height:26,borderRadius:7,border:`2px solid ${att[p]?C.greenBr:C.borderBr}`,background:att[p]?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",flexShrink:0}}>
                {att[p]&&<svg width="13" height="13" viewBox="0 0 13 13"><path d="M2 6.5L5.5 10L11 4" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>}
              </div>
              <div style={{color:att[p]?C.cream:C.creamDi,fontSize:14,fontWeight:600}}>{p}</div>
            </div>
            <div style={{color:C.gold,fontSize:14,direction:"rtl",fontFamily:"serif"}}>{{Fajr:"فجر",Ishraq:"اشراق",Zuhr:"ظہر",Asr:"عصر",Maghrib:"مغرب",Isha:"عشاء"}[p]}</div>
          </div>
        ))}
      </Cd>
      {saving?<Spinner/>:<Btn fn={save} v="gold" ch="💾 Save Attendance"/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   👨‍👩‍👧 FAMILY CONTACTS (Multiple)
══════════════════════════════════════════════════════ */
function FamilyContactsScreen({user,go,showToast}){
  const [contacts,setContacts]=useState(()=>JSON.parse(localStorage.getItem("jamat_fam_"+user.id)||"[]"));
  const [adding,setAdding]=useState(false);
  const [name,setName]=useState("");
  const [phone,setPhone]=useState("");
  const [rel,setRel]=useState("Wife");
  const save=list=>{setContacts(list);localStorage.setItem("jamat_fam_"+user.id,JSON.stringify(list));};
  const add=()=>{
    if(name.trim().length<2){showToast("Enter name","error");return;}
    if(phone.replace(/[^0-9]/g,"").length<10){showToast("Enter valid phone","error");return;}
    if(contacts.length>=3){showToast("Max 3 contacts","error");return;}
    save([...contacts,{name:name.trim(),phone:phone.trim(),rel}]);
    setName("");setPhone("");setAdding(false);showToast(name+" added!","success");
  };
  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("profile")} label="Profile"/>
      <div style={{padding:"14px 0 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>خاندانی رابطے</div><div style={{color:C.cream,fontSize:20,fontWeight:800}}>Family Contacts</div><div style={{color:C.txtDi,fontSize:11,marginTop:2}}>Max 3 · All get safety notifications</div></div>
        {contacts.length<3&&<button onClick={()=>setAdding(!adding)} style={{background:`linear-gradient(140deg,${C.goldHi},${C.gold})`,border:"none",borderRadius:10,padding:"8px 14px",color:C.bg,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{adding?"Cancel":"+ Add"}</button>}
      </div>
      {adding&&(
        <Cd s={{marginBottom:12,borderColor:C.gold}}>
          <Inp label="Full Name *" val={name} set={setName} ph="e.g. Fatima Ahmed"/>
          <Inp label="Mobile Number *" val={phone} set={setPhone} ph="+91 98765 43210" type="tel"/>
          <div style={{marginBottom:12}}>
            <div style={{color:C.creamDi,fontSize:12,marginBottom:7,fontWeight:500}}>Relation</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {["Wife","Husband","Father","Mother","Son","Daughter","Brother","Sister"].map(r=>(
                <button key={r} onClick={()=>setRel(r)} style={{padding:"4px 11px",borderRadius:7,border:`1.5px solid ${rel===r?C.gold:C.border}`,background:rel===r?C.goldDim:C.surface,color:rel===r?C.goldHi:C.creamDi,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{r}</button>
              ))}
            </div>
          </div>
          <Btn fn={add} v="gold" s={{padding:11,fontSize:13}} ch="✓ Add Contact"/>
        </Cd>
      )}
      {contacts.length===0&&!adding&&(<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:44,marginBottom:10}}>👨‍👩‍👧</div><div style={{color:C.creamDi,fontSize:14}}>No family contacts yet</div></div>)}
      {contacts.map((c,i)=>(
        <Cd key={i} s={{marginBottom:9}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${C.green},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,color:C.cream}}>{c.name[0]}</div>
              <div><div style={{color:C.cream,fontSize:13,fontWeight:700}}>{c.name}</div><div style={{color:C.creamDi,fontSize:12,marginTop:1}}>{c.rel} · {c.phone}</div></div>
            </div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>window.open("https://wa.me/"+c.phone.replace(/\D/g,""))} style={{background:"#041808",border:`1px solid ${C.greenBr}`,borderRadius:7,padding:"6px 10px",color:C.greenBr,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>💬</button>
              <button onClick={()=>save(contacts.filter((_,j)=>j!==i))} style={{background:C.redBg,border:`1px solid ${C.red}`,borderRadius:7,padding:"6px 10px",color:C.redHi,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
          </div>
          {i===0&&<div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${C.border}`,color:C.greenBr,fontSize:10}}>✓ Primary · Receives all alerts</div>}
        </Cd>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   🏛️ CREATE JAMAAT + AMIR HANDOVER + SOS HISTORY
══════════════════════════════════════════════════════ */
function CreateJamaatScreen({go,user,showToast}){
  const [name,setName]=useState("");
  const [amir,setAmir]=useState(user.en);
  const [dep,setDep]=useState("");
  const [ret,setRet]=useState("");
  const [loc,setLoc]=useState("");
  const [pin,setPin]=useState("");
  const [done,setDone]=useState(false);
  const create=async()=>{
    if(!name||!dep||!ret||!loc||pin.length!==6){showToast("Fill all fields","error");return;}
    const d={id:"j_"+Date.now(),en:name,name,amir_name:amir,departure:dep,returning:ret,location:loc,pincode:pin,status:"active",created_at:new Date().toISOString()};
    const ex=JSON.parse(localStorage.getItem("jamat_jamaats")||"[]");
    localStorage.setItem("jamat_jamaats",JSON.stringify([...ex,d]));
    if(BACKEND_READY)await _sb.from("jamaats").upsert(d).catch(()=>{});
    await DB.logNotification({type:"audit",sender_name:user.en,message:"New Jamaat created: "+name,channel:"app",lang:"en"});
    setDone(true);showToast("✓ Jamaat created!","success");
  };
  if(done)return(<div style={{padding:"24px 14px",textAlign:"center",maxWidth:460,margin:"0 auto"}}><div style={{paddingTop:40}}><div style={{fontSize:56,marginBottom:12}}>🕌</div><div style={{color:C.greenBr,fontSize:20,fontWeight:700}}>Jamaat Created!</div><Btn fn={()=>go("jamaatList")} v="gold" s={{marginTop:20}} ch="View All Jamaats"/></div></div>);
  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("admin")} label="Admin"/>
      <div style={{padding:"14px 0 16px"}}><div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>نئی جماعت</div><div style={{color:C.cream,fontSize:20,fontWeight:800}}>Create New Jamaat</div></div>
      <Inp label="Jamaat Name *" val={name} set={setName} ph="e.g. Tabligh Jamaat Maharashtra"/>
      <Inp label="Amir Name *" val={amir} set={setAmir} ph="Full name of Amir"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Inp label="Departure *" val={dep} set={setDep} ph="15 Apr 2025"/>
        <Inp label="Return *" val={ret} set={setRet} ph="15 May 2025"/>
      </div>
      <Inp label="Starting Location *" val={loc} set={setLoc} ph="e.g. Pune Markaz"/>
      <Inp label="Pincode *" val={pin} set={v=>setPin(v.replace(/\D/g,"").slice(0,6))} ph="411001" kb="numeric"/>
      <Btn fn={create} v="gold" ch="🕌 Create Jamaat"/>
    </div>
  );
}

function AmirHandoverScreen({go,user,showToast}){
  const [newAmir,setNewAmir]=useState("");
  const [reason,setReason]=useState("");
  const [done,setDone]=useState(false);
  const handover=async()=>{
    if(!newAmir.trim()){showToast("Enter new Amir name","error");return;}
    await DB.logNotification({type:"audit",sender_name:user.en,message:"Amir handover: "+user.en+" → "+newAmir+". Reason: "+reason,channel:"app",lang:"en"});
    setDone(true);showToast("✓ Handover recorded!","success");
  };
  if(done)return(<div style={{padding:"24px 14px",textAlign:"center",maxWidth:460,margin:"0 auto"}}><div style={{paddingTop:40}}><div style={{fontSize:56,marginBottom:12}}>🏛️</div><div style={{color:C.greenBr,fontSize:20,fontWeight:700}}>Handover Recorded</div><div style={{color:C.creamDi,marginTop:8}}>New Amir: <strong style={{color:C.gold}}>{newAmir}</strong></div></div></div>);
  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("jamaat")} label="Jamaat"/>
      <div style={{padding:"14px 0 16px"}}><div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>امارت کی منتقلی</div><div style={{color:C.cream,fontSize:20,fontWeight:800}}>Amir Handover</div></div>
      <Cd s={{marginBottom:14,borderColor:C.amber,background:"#1a0e04"}}><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:20}}>⚠️</span><div style={{color:C.amberHi,fontSize:12}}>Permanent action. Current Amir: <strong>{user.en}</strong></div></div></Cd>
      <Inp label="New Amir Name *" val={newAmir} set={setNewAmir} ph="Name of new Amir"/>
      <div style={{marginBottom:14}}><div style={{color:C.creamDi,fontSize:13,marginBottom:6}}>Reason</div><textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Travel, health, mutual decision..." style={{width:"100%",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.cream,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",resize:"none",height:80}}/></div>
      <Btn fn={handover} v="amber" dis={!newAmir.trim()} ch="🏛️ Confirm Handover"/>
    </div>
  );
}

function SOSHistoryScreen({go,user}){
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{DB.getNotifLogs&&DB.getNotifLogs(user.id).then(d=>{setLogs((d||[]).filter(l=>l.type==="sos"));setLoading(false);});return ()=>{};;},[]);
  return(
    <div style={{padding:"0 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("dashboard")} label="Dashboard"/>
      <div style={{padding:"14px 0 16px"}}><div style={{color:C.redHi,fontSize:12,direction:"rtl",marginBottom:2}}>ایمرجنسی تاریخ</div><div style={{color:C.cream,fontSize:20,fontWeight:800}}>SOS History</div></div>
      {loading&&[1,2].map(i=><div key={i} style={{height:80,borderRadius:14,marginBottom:10,background:C.surface}}/>)}
      {!loading&&logs.length===0&&(<div style={{textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:44,marginBottom:10}}>🟢</div><div style={{color:C.greenBr,fontSize:16,fontWeight:700}}>Alhamdulillah!</div><div style={{color:C.creamDi,fontSize:13,marginTop:6}}>No SOS alerts. All safe!</div></div>)}
      {logs.map((l,i)=>(<Cd key={i} s={{marginBottom:9,borderLeft:`3px solid ${C.redHi}`}}><div style={{display:"flex",gap:9,alignItems:"flex-start"}}><span style={{fontSize:22}}>🆘</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.redHi,fontSize:12,fontWeight:700}}>Emergency Alert</span><span style={{color:C.txtDi,fontSize:11}}>{l.sent_at?new Date(l.sent_at).toLocaleDateString("en-IN"):""}</span></div><div style={{color:C.creamDi,fontSize:11,marginTop:4,lineHeight:1.6}}>{(l.message||"").slice(0,80)}</div></div></div></Cd>))}
    </div>
  );
}


function BottomNav({active,go}){
  const items=[
    {id:"dashboard",icon:"🏠",label:"Home"},
    {id:"jamaat",icon:"🧭",label:"Jamaat"},
    {id:"events",icon:"🎪",label:"Events"},
    {id:"ledger",icon:"📜",label:"History"},
    {id:"profile",icon:"👤",label:"Profile"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100}}>
      {items.map(item=>(
        <button key={item.id} onClick={()=>go(item.id)}
          style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"8px 0 10px",fontFamily:"inherit",position:"relative",borderTop:`2px solid ${active===item.id?C.gold:"transparent"}`,transition:"border-color .2s"}}>
          <span style={{fontSize:21,filter:active===item.id?"none":"grayscale(80%) opacity(40%)",transition:"filter .2s"}}>{item.icon}</span>
          <span style={{fontSize:9,color:active===item.id?C.gold:C.txtDi,fontWeight:active===item.id?700:400,transition:"color .2s",letterSpacing:.3}}>{item.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   OFFLINE BANNER
══════════════════════════════════════════════════════ */
function OfflineBanner(){
  return(
    <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#1a0e04",borderBottom:`1px solid ${C.amber}`,padding:"8px 16px",zIndex:200,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:14}}>📡</span>
      <div>
        <div style={{color:C.amberHi,fontSize:12,fontWeight:700}}>You're Offline</div>
        <div style={{color:C.txtDi,fontSize:10}}>SOS, cached Jamaat info and QR pass still work</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════ */
function App(){
  const [phase,setPhase]=useState("splash");
  const [user,setUser]=useState(null);
  const [showWelcome,setShowWelcome]=useState(false);
  const [selMember,setSelMember]=useState(null);
  const [notifCount,setNotifCount]=useState(0);
  const [screen,setScreen]=useState("dashboard");
  const [selEvt,setSelEvt]=useState(null);
  const [showSOS,setShowSOS]=useState(false);
  const [events,setEvents]=useState(EVENTS_INIT);
  const [ledger,setLedger]=useState(LEDGER_INIT);
  const [toast,setToast]=useState(null);
  const online=useOnline();

  useEffect(()=>{
    const s=document.createElement("style");
    s.textContent=`
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
      html,body{background:${C.bg};overscroll-behavior:none}
      body{font-family:'Plus Jakarta Sans',system-ui,sans-serif}
      ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:${C.bg}}
      ::-webkit-scrollbar-thumb{background:${C.border};border-radius:99px}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
      @keyframes dot{from{transform:scale(.7);opacity:.4}to{transform:scale(1);opacity:1}}
      @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(5px)}}
      @keyframes sosGlow{0%,100%{box-shadow:0 4px 16px ${C.red}66}50%{box-shadow:0 4px 28px ${C.redHi}aa}}
      @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
      @keyframes grow{from{width:0}to{width:100%}}
      input:focus,textarea:focus{border-color:${C.gold}!important;outline:none}
      button:active{opacity:.82}
    `;
    document.head.appendChild(s);
    return()=>document.head.removeChild(s);
  },[]);

  const showToast=useCallback((msg,type="success")=>{setToast({msg,type,id:Date.now()});},[]);

  const go=useCallback((s)=>{
    setScreen(s);
    if(s!=="eventDetail")setSelEvt(null);
  },[]);

  const handleLogin=(u)=>{setUser(u);setPhase("tc");};
  const handleTC=()=>setPhase(user.family?"app":"family");
  const handleFamily=async(fam)=>{
    const updatedUser={...user,family:fam};
    setUser(updatedUser);
    setPhase("app");
    // Log welcome notification
    const welcomeMsg=DB.buildMessage("welcome",{name:updatedUser.en},updatedUser.lang||"ur");
    await DB.logNotification({
      type:"welcome",sender_id:updatedUser.id,sender_name:updatedUser.en,
      message:welcomeMsg,channel:"push",lang:updatedUser.lang||"ur",
    });
  };
  const handleRoleChange=(u)=>{setUser(u);go("dashboard");};

  const handleRegister=(evId)=>{
    setEvents(prev=>prev.map(e=>e.id===evId?{...e,mine:"registered",reg:e.reg+1}:e));
    if(selEvt?.id===evId)setSelEvt(p=>({...p,mine:"registered",reg:p.reg+1}));
    const ev=events.find(e=>e.id===evId);
    if(ev){
      const newEntry={id:`l${Date.now()}`,type:"event",name:ev.title,en:ev.en,start:new Date().toLocaleDateString("en-IN",{month:"short",day:"numeric"}),end:ev.date,status:"registered",score:null,days:1,hash:Math.random().toString(36).slice(2,14)};
      setLedger(p=>[newEntry,...p]);
    }
  };

  const handleArrived=()=>{showToast("Location updated · All families notified","success");};

  if(phase==="splash")return <Splash done={()=>setPhase("login")}/>;
  if(phase==="login")return <Login onLogin={handleLogin}/>;
  if(phase==="tc")return <TC user={user} onAccept={handleTC}/>;
  if(phase==="family")return <FamilySetup user={user} onDone={handleFamily}/>;
  if(showSOS)return <SOS user={user} onBack={()=>setShowSOS(false)}/>;

  const noNav=["qr","location","broadcast","sos","qrscan","welcome"].includes(screen);

  const renderScreen=()=>{
    if(screen==="welcome")return <JamaatWelcomeScreen go={go} onSkip={()=>go("jamaat")}/>;
    if(screen==="settings")return <SettingsScreen go={go} user={user} showToast={showToast}/>;
    if(screen==="help")return <HelpScreen go={go}/>;
    if(screen==="feedback")return <FeedbackScreen go={go} user={user} showToast={showToast}/>;
    if(screen==="islamic")return <IslamicScreen go={go} user={user}/>;
    if(screen==="analytics")return <AnalyticsScreen user={user} go={go} ledger={ledger}/>;
    if(screen==="notifications")return <NotificationsScreen go={go} user={user} clearNotifs={()=>setNotifCount&&setNotifCount(0)}/>;
    if(screen==="attendance")return <AttendanceScreen user={user} go={go} showToast={showToast}/>;
    if(screen==="familyContacts")return <FamilyContactsScreen user={user} go={go} showToast={showToast}/>;
    if(screen==="search")return <SearchScreen go={go} events={events} ledger={ledger} setEvt={setSelEvt}/>;
    if(screen==="memberProfile"&&selMember)return <MemberProfile member={selMember} go={go} user={user}/>;
    if(screen==="jamaatList")return <JamaatListScreen go={go} user={user} showToast={showToast}/>;
    if(screen==="createJamaat")return <CreateJamaatScreen go={go} user={user} showToast={showToast}/>;
    if(screen==="amirHandover")return <AmirHandoverScreen go={go} user={user} showToast={showToast}/>;
    if(screen==="sosHistory")return <SOSHistoryScreen go={go} user={user}/>;
    if(screen==="jamaat")return <JamaatScreen user={user} go={go} showToast={showToast} onMemberTap={m=>{setSelMember(m);go("memberProfile");}}/>;
    if(screen==="events")return <Events user={user} go={go} setEvt={setSelEvt} events={events}/>;
    if(screen==="eventDetail"&&selEvt)return <EventDetail ev={selEvt} user={user} onBack={()=>go("events")} onQR={()=>go("qr")} onRegister={handleRegister}/>;
    if(screen==="qrscan")return <QRScanner go={go} showToast={showToast}/>;
    if(screen==="qr")return <QRPass user={user} ev={selEvt||events.find(e=>e.mine==="registered")||events[0]} onBack={()=>go(selEvt?"eventDetail":"dashboard")}/>;
    if(screen==="ledger")return <Ledger user={user} go={go} ledger={ledger}/>;
    if(screen==="profile")return <Profile user={user} go={go} onRoleChange={handleRoleChange} showToast={showToast}/>;
    if(screen==="location")return <LocationUpdate user={user} go={go} showToast={showToast}/>;
    if(screen==="card")return <DigitalCard user={user} go={go}/>;
    if(screen==="map")return <MapView go={go}/>;
    if(screen==="admin")return <Admin go={go} showToast={showToast}/>;
    if(screen==="setup")return <SetupScreen go={go} showToast={showToast}/>;
    if(screen==="amal")return <AmalScreen go={go} user={user}/>;
    if(screen==="addMember")return <AddMember go={go} showToast={showToast}/>;
    if(screen==="health")return <HealthScreen user={user} go={go} showToast={showToast}/>;
    if(screen==="broadcast")return <BroadcastScreen user={user} go={go} showToast={showToast}/>;
    return <Dashboard user={user} go={go} events={events} onArrived={handleArrived}/>;
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <GeoBg/>
      {!online&&<OfflineBanner/>}
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      <div style={{maxWidth:480,margin:"0 auto",background:C.bg,minHeight:"100vh",position:"relative",zIndex:1}}>
        <div style={{position:"sticky",top:0,zIndex:50,background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:20}}>🕌</span>
            <span style={{color:C.gold,fontSize:16,fontWeight:900,letterSpacing:2.5}}>JAMAT</span>
            <button onClick={()=>go("search")} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"2px 4px"}}>🔍</button>
          </div>
          <div style={{display:"flex",gap:9,alignItems:"center"}}>
            {!online&&<span style={{fontSize:14}}>📡</span>}
            <button onClick={()=>{setNotifCount(0);go("notifications");}} style={{position:"relative",background:"none",border:"none",fontSize:18,cursor:"pointer",padding:"2px 4px"}}>
              🔔{notifCount>0&&<span style={{position:"absolute",top:-2,right:-2,width:16,height:16,borderRadius:"50%",background:C.redHi,color:"#fff",fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{notifCount>9?"9+":notifCount}</span>}
            </button>
            <Bdg v={user.role==="amir"?"gold":user.role==="state_admin"?"red":"green"}
              ch={user.role==="amir"?"Amir":user.role==="state_admin"?"Admin":"Member"}/>
            <div onClick={()=>go("profile")} style={{width:30,height:30,borderRadius:"50%",border:`1.5px solid ${C.gold}`,background:`linear-gradient(135deg,${C.green},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:C.cream,cursor:"pointer"}}>
              {user.en[0]}
            </div>
          </div>
        </div>
        <div style={{paddingBottom:noNav?0:80}}>{renderScreen()}</div>
        {!noNav&&<BottomNav active={screen} go={go}/>}
        {!noNav&&!showSOS&&(
          <button onClick={()=>setShowSOS(true)}
            style={{position:"fixed",right:16,bottom:80,width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${C.redHi},${C.red})`,border:"none",color:"#fff",fontSize:18,cursor:"pointer",zIndex:99,animation:"sosGlow 2s ease-in-out infinite",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>
            🆘
          </button>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  

</script>


</body>
</html>
