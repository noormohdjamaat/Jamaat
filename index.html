/* ══════════════════════════════════════════════════════
   SHA-256 HASH UTILITY (Web Crypto API — no raw storage)
══════════════════════════════════════════════════════ */
const AADHAAR_PEPPER = "jamat-platform-2025-secure-pepper";

async function sha256Hash(text) {
  const msgBuffer = new TextEncoder().encode(text + AADHAAR_PEPPER);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray  = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

  async checkBlacklist(aadhaarRaw) {
    const hash = await sha256Hash(aadhaarRaw.replace(/\s/g,""));
    if (!BACKEND_READY) {
      // localStorage fallback for demo
      const list = JSON.parse(localStorage.getItem("jamat_blacklist") || "[]");
      return list.includes(hash) ? { banned: true, reason: "Demo ban (localStorage)" } : { banned: false };
    }
    const { data } = await _sb
      .from("blacklisted_identities")
      .select("reason, banned_at")
      .eq("aadhaar_hash", hash)
      .neq("severity", "lifted")
      .maybeSingle();
    return data ? { banned: true, reason: data.reason, bannedAt: data.banned_at } : { banned: false };
  },

  async addBlacklist(aadhaarRaw, reason, bannedBy) {
    const hash = await sha256Hash(aadhaarRaw.replace(/\s/g,""));
    if (!BACKEND_READY) {
      const list = JSON.parse(localStorage.getItem("jamat_blacklist") || "[]");
      list.push(hash);
      localStorage.setItem("jamat_blacklist", JSON.stringify(list));
      return { ok: true };
    }
    const { error } = await _sb.from("blacklisted_identities").insert({
      aadhaar_hash: hash, reason, banned_by: bannedBy, severity: "permanent"

    return { ok: !error, error };

  // Send SMS via Supabase Edge Function (avoids CORS)
  async send(phone, message) {
    const num = phone.replace(/[^0-9]/g,"").slice(-10);
    if(num.length !== 10) { console.warn("Invalid phone:", phone); return {ok:false}; }

    try {
      // Call Supabase Edge Function (server-side, no CORS issue)
      const res = await fetch(
        "https://xpkfagerukqbvzgpqsmj.supabase.co/functions/v1/send-sms",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${SUPABASE_KEY}`,
          },
          body: JSON.stringify({ phone: num, message }),
        }
      );
      const data = await res.json();
      console.log("SMS result:", data);
      return { ok: data.ok === true, data };
    } catch(e) {
      console.error("SMS error:", e);
      // Log to DB even if SMS fails
      await DB.logNotification({type:"sms_error",sender_name:"system",message:e.message,channel:"sms"});
      return { ok: false, error: e.message };
    }
  },

  // Send arrival notification
  async arrival(familyPhone, userName, location, jamaat, pincode, lang="ur") {
    const msg = DB.buildMessage("arrival", {
      name: userName, location, jamaat, pincode,
      time: new Date().toLocaleTimeString("en-IN"),
    }, lang);
    const result = await this.send(familyPhone, msg);
    await DB.logNotification({
      type:"arrival", sender_name:userName,
      message:msg, channel:"sms", lang,
      location, pincode,
    });
    return result;
  },

  // Send SOS alert
  async sos(amirPhone, familyPhone, userName, location, bloodGroup, lang="ur") {
    const msg = DB.buildMessage("sos", {
      name: userName, location,
      amir: JAMAAT.amir.en,
      blood: bloodGroup || "Unknown",
    }, lang);
    const results = await Promise.all([
      amirPhone   ? this.send(amirPhone, msg)   : Promise.resolve({ok:false}),
      familyPhone ? this.send(familyPhone, msg) : Promise.resolve({ok:false}),
    ]);
    await DB.logNotification({
      type:"sos", sender_name:userName,
      message:msg, channel:"sms", lang, location,
    });
    return results;
  },

  // Send broadcast to multiple numbers
  async broadcast(phones, message, senderName, lang="ur") {
    const msg = DB.buildMessage("broadcast", {
      message, amir: senderName,
    }, lang);
    const results = [];
    for(const phone of phones) {
      const r = await this.send(phone, msg);
      results.push(r);
    }
    await DB.logNotification({
      type:"broadcast", sender_name:senderName,
      message:msg, channel:"sms", lang,
    });
    return results;
  },
};

function useMount(delay=0){
  const [v,setV]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setV(true),delay);return()=>clearTimeout(t);},[]);
  return v;
}

function useOnline(){
  const [online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);
  return online;
}

const QRComp = ({data,sz=160}) => {
  const h=data.split("").reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0)>>>0;
  const N=21,cell=sz/N;
  const fin=[[0,0],[0,14],[14,0]];
  const isFin=(r,c)=>fin.some(([fr,fc])=>r>=fr&&r<fr+7&&c>=fc&&c<fc+7);
  const on=(r,c)=>{
    const s=fin.some(([fr,fc])=>r>=fr+2&&r<fr+5&&c>=fc+2&&c<fc+5);
    return s||(!isFin(r,c)&&((h*r*31+c*17+r*c*7)%11<5));
  };
  return(
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}>
      <rect width={sz} height={sz} fill="#fff"/>
      {fin.map(([fr,fc])=>(
        <g key={`${fr}-${fc}`}>
          <rect x={fc*cell} y={fr*cell} width={7*cell} height={7*cell} fill={C.bg}/>
          <rect x={(fc+1)*cell} y={(fr+1)*cell} width={5*cell} height={5*cell} fill="#fff"/>
          <rect x={(fc+2)*cell} y={(fr+2)*cell} width={3*cell} height={3*cell} fill={C.bg}/>
        </g>
      ))}
      {Array.from({length:N},(_,r)=>Array.from({length:N},(_,c)=>
        (!isFin(r,c)&&on(r,c))?<rect key={`${r}-${c}`} x={c*cell} y={r*cell} width={cell} height={cell} fill={C.bg}/>:null
      ))}
    </svg>
  );
};

function HealthScreen({user,go,showToast}){
  const isAmir=user.role==="amir";
  const [editing,setEditing]=useState(false);
  const [bg,setBg]=useState(user.bloodGroup||"O+");
  const [conditions,setConditions]=useState("");
  const [meds,setMeds]=useState("");
  const [allergies,setAllergies]=useState("");
  const [notes,setNotes]=useState("");
  const [visibleToAmir,setVisibleToAmir]=useState(true);
  const [dbLoading,setDbLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [jamaatHealth,setJamaatHealth]=useState([]);
  const bgs=["A+","A-","B+","B-","O+","O-","AB+","AB-"];

  /* Load from backend on mount */
  useEffect(()=>{
    (async()=>{
      setDbLoading(true);
      if(isAmir){
        const data=await DB.loadJamaatHealth(JAMAAT.id);
        setJamaatHealth(data||[]);
        // Log audit access
        await DB.logNotification({type:"audit",sender_id:user.id,sender_name:user.en,
          message:`Amir ${user.en} viewed health profiles for ${JAMAAT.en}`,channel:"audit",lang:"en"});
      } else {
        const data=await DB.loadHealth(user.id);

/* ══════════════════════════════════════════════════════
   SCREEN: BROADCAST (Amir)
══════════════════════════════════════════════════════ */
function BroadcastScreen({user,go,showToast}){
  const [msg,setMsg]=useState("");
  const [lang,setLang]=useState("ur");
  const [loading,setLoading]=useState(false);
  const [sent,setSent]=useState(false);

  const preview=msg?renderTemplate(NOTIF_TEMPLATES.broadcast[lang],{message:msg,amir:user.en,time:new Date().toLocaleTimeString()}):"";

  const send=async()=>{
    setLoading(true);
    // Send REAL SMS via Fast2SMS to family contacts
    const phones = JAMAAT.members.map(m=>m.familyPhone).filter(Boolean);
    if(user.family?.phone) phones.push(user.family.phone);
    await SMS.broadcast(phones, msg, user.en, lang);
    setLoading(false);
    setSent(true);
    showToast(`📱 SMS bheja gaya ${phones.length} contacts ko!`,"success");
  };

  if(sent) return(
    <div style={{padding:"24px 14px",maxWidth:460,margin:"0 auto",textAlign:"center"}}>
      <BackBtn fn={()=>go("jamaat")} label="Back"/>
      <div style={{paddingTop:40}}>
        <div style={{fontSize:56,marginBottom:16}}>📢</div>
        <div style={{color:C.greenBr,fontSize:22,fontWeight:700}}>Broadcast Sent!</div>
        <div style={{color:C.creamDi,fontSize:13,marginTop:8}}>Message delivered to all 6 family contacts</div>
        <Cd s={{marginTop:20,textAlign:"left",borderColor:C.green}}>
          <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:10,direction:lang==="ur"?"rtl":"ltr"}}>پیغام بھیجا گیا</div>
          <div style={{background:C.surface,borderRadius:8,padding:12,color:C.cream,fontSize:12,lineHeight:1.9,direction:lang==="ur"?"rtl":"ltr",whiteSpace:"pre-line"}}>{preview}</div>
          <div style={{color:C.txtDi,fontSize:11,marginTop:10}}>📱 SMS + WhatsApp · {new Date().toLocaleString()}</div>
        </Cd>
        <Btn fn={()=>setSent(false)} v="outline" s={{marginTop:20}} ch="Send Another Broadcast"/>
      </div>
    </div>
  );

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("jamaat")} label="Back to Jamaat"/>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>جماعت اعلان</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Broadcast Message</div>
        <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>Sent to all 6 family contacts via SMS + WhatsApp</div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["ur","اردو"],["en","English"]].map(([l,label])=>(
          <button key={l} onClick={()=>setLang(l)} style={{flex:1,padding:"10px",borderRadius:9,border:`1.5px solid ${lang===l?C.gold:C.border}`,background:lang===l?C.goldDim:C.surface,color:lang===l?C.goldHi:C.creamDi,fontFamily:"inherit",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s"}}>{label}</button>
        ))}
      </div>

      <div style={{marginBottom:16}}>
        <div style={{color:C.creamDi,fontSize:13,marginBottom:7,fontWeight:500}}>Your Message</div>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder={lang==="ur"?"مثال: کل فجر کے بعد اجتماعی تلاوت ہوگی…":"e.g. Tomorrow after Fajr there will be collective Tilawat…"}
          style={{width:"100%",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"13px 15px",color:C.cream,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",resize:"vertical",minHeight:100,direction:lang==="ur"?"rtl":"ltr",lineHeight:1.7,transition:"border-color .2s"}}
          onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>

      {preview&&(
        <Cd s={{marginBottom:16,borderColor:C.goldDim}}>
          <div style={{color:C.creamDi,fontSize:11,marginBottom:8}}>Preview (WhatsApp format):</div>
          <div style={{background:C.surface,borderRadius:8,padding:12,color:C.cream,fontSize:12,lineHeight:1.9,direction:lang==="ur"?"rtl":"ltr",whiteSpace:"pre-line"}}>{preview}</div>
        </Cd>
      )}

      {loading?<Spinner/>:<Btn fn={send} v="gold" dis={!msg.trim()} ch="📢 Send Broadcast to All Families"/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   SCREEN: SOS (upgraded with health data)
══════════════════════════════════════════════════════ */
function SOS({user,onBack}){
  const [phase,setPhase]=useState("idle");
  const [cd,setCd]=useState(3);
  const holdRef=useRef(),cdRef=useRef();

  const startHold=()=>{
    if(phase!=="idle")return;
    setPhase("holding");setCd(3);
    cdRef.current=setInterval(()=>setCd(p=>{if(p<=1){clearInterval(cdRef.current);return 0;}return p-1;}),1000);
    holdRef.current=setTimeout(async()=>{
      setPhase("sent");
      // Send REAL SMS via Fast2SMS
      await SMS.sos(
        JAMAAT.amir.phone,
        user.family?.phone||"",
        user.en,
        "Pune Markaz (18.52°N, 73.86°E)",
        user.bloodGroup||"Unknown",
        user.lang||"ur"
      );
    },3100);
  };
  const cancel=()=>{
    if(phase!=="holding")return;
    clearTimeout(holdRef.current);clearInterval(cdRef.current);
    setPhase("idle");setCd(3);
  };

  const sosMsg=renderTemplate(NOTIF_TEMPLATES.sos.ur,{
    name:user.en,location:"Pune Markaz (18.52°N, 73.86°E)",
    time:new Date().toLocaleTimeString(),amir:JAMAAT.amir.en
  });

  return(
    <div style={{position:"fixed",inset:0,background:phase==="sent"?"#160000":phase==="holding"?"#1a0404":C.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:24,zIndex:200,transition:"background .4s"}}>
      <GeoBg/>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:440,display:"flex",flexDirection:"column",alignItems:"center",height:"100%"}}>
        <div style={{width:"100%",marginBottom:20}}><BackBtn fn={onBack} label="Cancel"/></div>
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,width:"100%"}}>
          {phase==="sent"?(
            <>
              <div style={{fontSize:72,animation:"pulse 1s ease-in-out infinite"}}>🆘</div>
              <div style={{color:C.redHi,fontSize:28,fontWeight:900}}>SOS SENT!</div>
              <div style={{color:C.cream,fontSize:14,textAlign:"center",lineHeight:1.8}}>
                Alert sent to:<br/>
                <span style={{color:C.gold}}>→ {JAMAAT.amir.en} (Amir)</span><br/>
                <span style={{color:C.gold}}>→ {user.family?.name||"Family Contact"}</span>
              </div>
              <Cd s={{width:"100%",borderColor:C.red,textAlign:"left"}}>
                <div style={{color:C.creamDi,fontSize:11,marginBottom:8}}>Message sent (Urdu template):</div>
                <div style={{background:C.surface,borderRadius:8,padding:10,color:C.cream,fontSize:12,lineHeight:1.9,direction:"rtl",whiteSpace:"pre-line"}}>{sosMsg}</div>
                {user.bloodGroup&&(
                  <div style={{marginTop:8,padding:"6px 10px",background:C.redBg,borderRadius:6,display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:14}}>🩸</span>
                    <div>
                      <span style={{color:C.redHi,fontSize:12,fontWeight:700}}>Blood Group included:</span>
                      <span style={{color:C.cream,fontSize:12}}> {user.bloodGroup}</span>
                    </div>
                  </div>
                )}
              </Cd>
              <Btn fn={()=>setPhase("idle")} v="outline" ch="✓ I'm Safe Now — Clear Alert"/>
            </>
          ):(
            <>
              <div style={{color:C.cream,fontSize:20,fontWeight:700,direction:"rtl"}}>ایمرجنسی مدد</div>
              <div style={{color:C.creamDi,fontSize:13,textAlign:"center",maxWidth:300}}>Hold the button for 3 seconds to send emergency alert to your Amir and family contact</div>
              <div
                onMouseDown={startHold} onMouseUp={cancel} onMouseLeave={cancel}
                onTouchStart={e=>{e.preventDefault();startHold();}} onTouchEnd={cancel}
                style={{width:168,height:168,borderRadius:"50%",background:phase==="holding"?`radial-gradient(${C.redHi},${C.red})`:C.redBg,border:`4px solid ${phase==="holding"?C.redHi:C.red}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",userSelect:"none",transition:"all .3s",boxShadow:phase==="holding"?`0 0 60px ${C.redHi}60`:"none",flexShrink:0}}>
                <div style={{fontSize:52}}>🆘</div>
                <div style={{color:"#fff",fontSize:phase==="holding"?36:15,fontWeight:900,marginTop:4}}>{phase==="holding"?cd:"HOLD"}</div>
              </div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
                {[["Amir",JAMAAT.amir.en],["Family",user.family?.name||"Family"]].map(([k,v])=>(
                  <Cd key={k} s={{padding:"10px 16px",textAlign:"center",minWidth:130}}>
                    <div style={{color:C.txtDi,fontSize:10}}>{k} Alert</div>
                    <div style={{color:C.cream,fontSize:12,fontWeight:700,marginTop:3}}>{v}</div>
                    <div style={{color:C.greenBr,fontSize:10,marginTop:3}}>📱 SMS + Push</div>
                  </Cd>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════

function LocationUpdate({user,go,showToast}){
  const [loc,setLoc]=useState("");
  const [pin,setPin]=useState("");
  const [lang,setLang]=useState("ur");
  const [sent,setSent]=useState(false);
  const [loading,setLoading]=useState(false);
  const [detecting,setDetecting]=useState(false);
  const presets=["Mumbai Markaz","Pune Markaz","Nashik Markaz","Aurangabad Markaz","Nagpur Markaz","Delhi Markaz","Bhopal Markaz"];
  const ok=loc.trim().length>=2&&pin.replace(/\D/g,"").length===6;

  const detectGeo=()=>{
    setDetecting(true);
    setTimeout(()=>{setDetecting(false);setLoc("Pune Markaz");setPin("411001");showToast("Location auto-detected via GPS","success");},2000);
  };

  const tpl=renderTemplate(NOTIF_TEMPLATES.arrival[lang],{
    name:JAMAAT.members[0].en,location:loc||"[Location]",
    jamaat:JAMAAT.en,time:new Date().toLocaleTimeString(),pincode:pin||"——"
  });

  const send=async()=>{
    setLoading(true);
    // Send REAL SMS to all jamaat member family contacts
    const familyPhones = JAMAAT.members
      .map(m => m.familyPhone || null)
      .filter(Boolean);

    // Also send to the demo family contact if set
    if(user.family?.phone) familyPhones.push(user.family.phone);

    // Send SMS via Fast2SMS
    if(familyPhones.length > 0) {
      await Promise.all(familyPhones.map(phone =>
        SMS.arrival(phone, JAMAAT.members[0].en, loc, JAMAAT.en, pin, lang)
      ));
    } else {
      // Log only (no family phones in demo data)
      await SMS.arrival(user.family?.phone||"", JAMAAT.members[0].en, loc, JAMAAT.en, pin, lang);
    }
    setLoading(false);
    setSent(true);
  };

  if(sent) return(
    <div style={{padding:"24px 14px",maxWidth:460,margin:"0 auto",textAlign:"center"}}>
      <BackBtn fn={()=>{setSent(false);go("dashboard");}} label="Dashboard"/>
      <div style={{paddingTop:40}}>
        <div style={{fontSize:56,marginBottom:16}}>✅</div>
        <div style={{color:C.greenBr,fontSize:22,fontWeight:700}}>Location Updated!</div>
        <div style={{color:C.creamDi,fontSize:13,marginTop:8}}>All 6 family contacts notified</div>
        <Cd s={{marginTop:20,textAlign:"left",borderColor:C.green}}>
          <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:10,direction:lang==="ur"?"rtl":"ltr"}}>پیغام بھیجا گیا</div>
          <div style={{background:C.surface,borderRadius:8,padding:12,color:C.cream,fontSize:12,lineHeight:1.9,direction:lang==="ur"?"rtl":"ltr",whiteSpace:"pre-line"}}>{tpl}</div>
          <div style={{color:C.txtDi,fontSize:11,marginTop:10}}>📱 SMS + WhatsApp · {new Date().toLocaleString()}</div>
        </Cd>
        <Btn fn={()=>setSent(false)} v="outline" s={{marginTop:20}} ch="Update Again"/>
      </div>
    </div>
  );

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>go("dashboard")} label="Dashboard"/>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>مقام کی تجدید</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Update Jamaat Location</div>
        <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>All family contacts notified via SMS + WhatsApp</div>
      </div>

      {/* Language */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["ur","اردو"],["en","English"]].map(([l,label])=>(
          <button key={l} onClick={()=>setLang(l)} style={{flex:1,padding:"9px",borderRadius:9,border:`1.5px solid ${lang===l?C.gold:C.border}`,background:lang===l?C.goldDim:C.surface,color:lang===l?C.goldHi:C.creamDi,fontFamily:"inherit",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s"}}>{label}</button>
        ))}
      </div>

      {/* Geo detect */}
      <button onClick={detectGeo} disabled={detecting}
        style={{width:"100%",marginBottom:14,padding:"12px",border:`1.5px solid ${C.teal}`,borderRadius:10,background:"#041e1e",color:C.tealHi,fontSize:13,fontWeight:700,cursor:detecting?"wait":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {detecting?<Spinner size={16}/>:<span>📡</span>}
        {detecting?"Detecting GPS…":"Auto-detect Current Location (GPS)"}
      </button>

      <div style={{color:C.creamDi,fontSize:12,marginBottom:10}}>Or select preset:</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
        {presets.map(p=>(
          <button key={p} onClick={()=>setLoc(p)} style={{padding:"6px 13px",borderRadius:8,border:`1.5px solid ${loc===p?C.gold:C.border}`,background:loc===p?C.goldDim:C.surface,color:loc===p?C.goldHi:C.creamDi,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{p}</button>
        ))}
      </div>

      <Inp label="Location Name" val={loc} set={setLoc} ph="e.g. Pune Markaz"/>
      <Inp label="Pincode" val={pin} set={v=>setPin(v.replace(/\D/g,"").slice(0,6))} ph="411001" max={6} kb="numeric"/>

      {ok&&(
        <Cd s={{marginBottom:16,borderColor:C.goldDim}}>
          <div style={{color:C.creamDi,fontSize:11,marginBottom:8}}>Preview notification (to each family contact):</div>
          <div style={{background:C.surface,borderRadius:8,padding:12,color:C.cream,fontSize:12,lineHeight:1.9,direction:lang==="ur"?"rtl":"ltr",whiteSpace:"pre-line"}}>{tpl}</div>
          <div style={{color:C.greenBr,fontSize:11,marginTop:8}}>📱 6 family contacts will receive this via {lang==="ur"?"Urdu":"English"}</div>
        </Cd>
      )}

      {loading?<Spinner/>:<Btn fn={send} v="gold" dis={!ok} ch="📍 Update Location & Notify Families"/>}
    </div>
  );
}

          const text=ledger.map(l=>`${l.type==="jamaat"?"🧭":"🎪"} ${l.en}
   ${l.start} → ${l.end} · ${l.days} days${l.score?" · Score: "+l.score:""}
   Hash: ${l.hash}`).join("

");

      <Cd s={{marginBottom:14}}>

/* ══════════════════════════════════════════════════════
   SCREEN: QR SCANNER (Feature 7)
══════════════════════════════════════════════════════ */
function QRScanner({go,showToast}){
  const [scanning,setScanning]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const videoRef=useRef();
  const canvasRef=useRef();
  const streamRef=useRef();
  const animRef=useRef();

  const startScan=async()=>{
    setError("");setResult(null);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      streamRef.current=stream;
      videoRef.current.srcObject=stream;
      videoRef.current.play();
      setScanning(true);
      requestAnimationFrame(tick);
    }catch(e){setError("Camera access denied. Please allow camera.");}
  };

  const tick=()=>{
    const video=videoRef.current;
    const canvas=canvasRef.current;
    if(!video||!canvas||!video.readyState===4){animRef.current=requestAnimationFrame(tick);return;}
    canvas.height=video.videoHeight;canvas.width=video.videoWidth;
    const ctx=canvas.getContext("2d");
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=typeof jsQR!=="undefined"?jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:"dontInvert"}):null;
    if(code){
      stopScan();
      setResult(code.data);
      processQR(code.data);
    }else{
      animRef.current=requestAnimationFrame(tick);
    }
  };

  const stopScan=()=>{
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    if(animRef.current) cancelAnimationFrame(animRef.current);
    setScanning(false);
  };

  const processQR=(data)=>{
    if(data.startsWith("JAMAT:REG:")){
      const parts=data.split(":");
      showToast("✓ Valid JAMAT QR Code — Entry Confirmed!","success");
      DB.logNotification({type:"qr_scan",sender_name:"Scanner",message:`QR scanned: ${data}`,channel:"app",lang:"en"});
    }else if(data.startsWith("JAMAT-CARD:")){
      showToast("✓ Valid Member Card Scanned!","success");
    }else{
      showToast("QR scanned: "+data.slice(0,30),"info");
    }
  };

  useEffect(()=>()=>{stopScan();},[]);

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto"}}>
      <BackBtn fn={()=>{stopScan();go("dashboard");}} label="Dashboard"/>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>QR اسکینر</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>QR Code Scanner</div>
        <div style={{color:C.txtDi,fontSize:12,marginTop:3}}>Event entry ke liye QR scan karo</div>
      </div>

      {/* Camera View */}
      <Cd s={{marginBottom:14,padding:0,overflow:"hidden",position:"relative"}}>
        <video ref={videoRef} style={{width:"100%",height:260,objectFit:"cover",display:scanning?"block":"none",background:"#000"}} playsInline muted/>
        <canvas ref={canvasRef} style={{display:"none"}}/>
        {!scanning&&(
          <div style={{height:260,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.surface,gap:12}}>
            <div style={{fontSize:56}}>📷</div>
            <div style={{color:C.creamDi,fontSize:14}}>Camera yahan dikhega</div>
          </div>
        )}
        {scanning&&(
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:180,height:180,border:"3px solid "+C.gold,borderRadius:12,pointerEvents:"none"}}>
            <div style={{position:"absolute",top:-3,left:-3,width:24,height:24,borderTop:"4px solid "+C.gold,borderLeft:"4px solid "+C.gold,borderRadius:"4px 0 0 0"}}/>
            <div style={{position:"absolute",top:-3,right:-3,width:24,height:24,borderTop:"4px solid "+C.gold,borderRight:"4px solid "+C.gold,borderRadius:"0 4px 0 0"}}/>
            <div style={{position:"absolute",bottom:-3,left:-3,width:24,height:24,borderBottom:"4px solid "+C.gold,borderLeft:"4px solid "+C.gold,borderRadius:"0 0 0 4px"}}/>
            <div style={{position:"absolute",bottom:-3,right:-3,width:24,height:24,borderBottom:"4px solid "+C.gold,borderRight:"4px solid "+C.gold,borderRadius:"0 0 4px 0"}}/>
          </div>
        )}
      </Cd>

      {error&&<Cd s={{marginBottom:14,borderColor:C.red,background:C.redBg}}><div style={{color:C.redHi,fontSize:13}}>{error}</div></Cd>}

      {result&&(
        <Cd s={{marginBottom:14,borderColor:C.greenBr,background:"#041808"}}>
          <div style={{color:C.greenBr,fontSize:14,fontWeight:700,marginBottom:6}}>✓ QR Scanned!</div>
          <div style={{color:C.creamDi,fontSize:11,fontFamily:"monospace",wordBreak:"break-all"}}>{result}</div>
          <Btn fn={()=>setResult(null)} v="outline" s={{marginTop:12,padding:10,fontSize:13}} ch="Scan Another"/>
        </Cd>
      )}

      {!scanning?(
        <Btn fn={startScan} v="gold" ch="📷 Start Camera Scan"/>
      ):(
        <Btn fn={stopScan} v="danger" ch="⏹ Stop Scanning"/>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   🕌 ISLAMIC FEATURES SCREEN
   Prayer times, Qibla, Daily Hadith, Quran verse
══════════════════════════════════════════════════════ */
function IslamicScreen({go,user}){
  const [prayers,setPrayers]=useState(null);
  const [hadith,setHadith]=useState(null);
  const [qibla,setQibla]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("prayers");

  // Hadiths collection (offline fallback)
  const HADITHS=[
    {text:"Actions are judged by intentions, and every person will get the reward according to what he has intended.",source:"Sahih al-Bukhari 1",ar:"إنَّمَا الأعمالُ بالنِّيَّاتِ"},
    {text:"The best of you are those who learn the Quran and teach it.",source:"Sahih al-Bukhari 5027",ar:"خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ"},
    {text:"None of you will have faith till he wishes for his (Muslim) brother what he likes for himself.",source:"Sahih al-Bukhari 13",ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ"},
    {text:"The strong man is not the one who overcomes people by his strength, but the one who controls himself while in anger.",source:"Sahih al-Bukhari 6114",ar:"لَيْسَ الشَّدِيدُ بِالصُّرْعَةِ"},
    {text:"Make things easy and do not make them difficult, cheer the people up by conveying glad tidings to them and do not repulse them.",source:"Sahih al-Bukhari 69",ar:"يَسِّرُوا وَلَا تُعَسِّرُوا"},
    {text:"Whoever believes in Allah and the Last Day should talk what is good or keep quiet.",source:"Sahih al-Bukhari 6018",ar:"مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ"},
    {text:"The best charity is that given when one is in need and struggling.",source:"Sunan Abu Dawud 1677",ar:"أَفْضَلُ الصَّدَقَةِ جُهْدُ الْمُقِلِّ"},
  ];

  useEffect(()=>{
    const idx=new Date().getDate()%HADITHS.length;
    setHadith(HADITHS[idx]);

    // Fetch prayer times
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(async(pos)=>{
        try{
          const {latitude:lat,longitude:lng}=pos.coords;
          // Qibla calculation
          const meccaLat=21.3891, meccaLng=39.8579;
          const dLng=(meccaLng-lng)*Math.PI/180;
          const lat1=lat*Math.PI/180, lat2=meccaLat*Math.PI/180;
          const y=Math.sin(dLng)*Math.cos(lat2);
          const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
          const bearing=(Math.atan2(y,x)*180/Math.PI+360)%360;
          setQibla({bearing:Math.round(bearing),lat,lng});

          // Prayer times via free API
          const resp=await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=1`);
          const data=await resp.json();
          if(data.code===200) setPrayers(data.data.timings);
        }catch(e){console.warn("Prayer API:",e);}
        setLoading(false);
      },()=>{
        // Default to Mumbai
        setPrayers({Fajr:"05:15",Sunrise:"06:45",Dhuhr:"12:30",Asr:"15:45",Maghrib:"19:10",Isha:"20:30"});
        setQibla({bearing:292});
        setLoading(false);
      });
    }else{
      setPrayers({Fajr:"05:15",Sunrise:"06:45",Dhuhr:"12:30",Asr:"15:45",Maghrib:"19:10",Isha:"20:30"});
      setQibla({bearing:292});
      setLoading(false);
    }
  },[]);

  const prayerList=[
    {key:"Fajr",ur:"فجر",icon:"🌙"},
    {key:"Sunrise",ur:"طلوع",icon:"🌅"},
    {key:"Dhuhr",ur:"ظہر",icon:"☀️"},
    {key:"Asr",ur:"عصر",icon:"🌤️"},
    {key:"Maghrib",ur:"مغرب",icon:"🌇"},
    {key:"Isha",ur:"عشاء",icon:"⭐"},
  ];

  return(
    <div style={{padding:"0 14px 100px",maxWidth:460,margin:"0 auto",animation:"fadeIn .3s ease"}}>
      <div style={{padding:"20px 6px 14px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>اسلامی خدمات</div>
        <div style={{color:C.cream,fontSize:22,fontWeight:800}}>Islamic Features</div>
      </div>

      {/* Bismillah */}
      <Cd s={{marginBottom:14,textAlign:"center",backgroundImage:`linear-gradient(135deg,${C.card},#0d1e10)`,borderColor:C.goldDim}}>
        <div style={{color:C.gold,fontSize:20,fontFamily:"serif",direction:"rtl",lineHeight:1.8,marginBottom:6}}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div style={{color:C.creamDi,fontSize:11,letterSpacing:2}}>In the name of Allah, the Most Gracious, the Most Merciful</div>
      </Cd>

      {/* Tabs */}
      <div style={{display:"flex",background:C.surface,borderRadius:12,padding:4,marginBottom:16,gap:3}}>
        {[["prayers","🕌 Namaz"],["hadith","📖 Hadith"],["qibla","🧭 Qibla"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px 4px",borderRadius:9,border:"none",background:tab===t?C.gold:"transparent",color:tab===t?C.bg:C.creamDi,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>{l}</button>
        ))}
      </div>

      {tab==="prayers"&&(
        <div className="screen-enter">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{color:C.creamDi,fontSize:12}}>Today's prayer times {loading?"— detecting location…":"— your location"}</div>
            <div style={{color:C.txtDi,fontSize:11}}>{new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
          </div>
          {loading?[1,2,3,4,5,6].map(i=><div key={i} className="skeleton" style={{height:52,borderRadius:12,marginBottom:8}}/>):(
            prayerList.map(p=>{
              const now=new Date();
              const [h,m]=prayers?.[p.key]?.split(":")||["0","0"];
              const pTime=new Date();pTime.setHours(+h,+m,0);
              const isPast=pTime<now;
              const isNext=!isPast&&prayerList.findIndex(x=>x.key===p.key)===prayerList.findIndex(x=>{
                const [xh,xm]=prayers?.[x.key]?.split(":")||["0","0"];
                const t=new Date();t.setHours(+xh,+xm,0);return t>now;
              });
              return(
                <Cd key={p.key} s={{marginBottom:8,padding:"12px 16px",borderColor:isNext?C.gold:isPast?"#0a1610":C.border,background:isNext?C.goldDim:C.card,opacity:isPast?0.6:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <span style={{fontSize:22}}>{p.icon}</span>
                      <div>
                        <div style={{color:isNext?C.goldHi:C.cream,fontSize:14,fontWeight:700}}>{p.key}</div>
                        <div style={{color:C.gold,fontSize:13,direction:"rtl",fontFamily:"serif"}}>{p.ur}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:isNext?C.goldHi:isPast?C.txtDi:C.cream,fontSize:18,fontWeight:800,fontFamily:"monospace"}}>{prayers?.[p.key]||"--:--"}</div>
                      {isNext&&<div style={{color:C.goldHi,fontSize:10,marginTop:2}}>▶ NEXT</div>}
                      {isPast&&<div style={{color:C.txtDi,fontSize:10,marginTop:2}}>✓ done</div>}
                    </div>
                  </div>
                </Cd>
              );
            })
          )}
        </div>
      )}

      {tab==="hadith"&&hadith&&(
        <div className="screen-enter">
          <Cd s={{marginBottom:14,borderColor:C.goldDim,backgroundImage:`linear-gradient(160deg,${C.card},#0a1810)`}}>
            <div style={{color:C.gold,fontSize:11,letterSpacing:1,marginBottom:12}}>📖 HADITH OF THE DAY</div>
            <div style={{color:C.gold,fontSize:16,direction:"rtl",fontFamily:"serif",lineHeight:1.9,marginBottom:14,borderBottom:`1px solid ${C.border}`,paddingBottom:14}}>{hadith.ar}</div>
            <div style={{color:C.cream,fontSize:14,lineHeight:1.8,marginBottom:10,fontStyle:"italic"}}>"{hadith.text}"</div>
            <div style={{color:C.txtDi,fontSize:11}}>{hadith.source}</div>
          </Cd>
          <div style={{color:C.txtDi,fontSize:11,textAlign:"center",lineHeight:1.7}}>A new hadith appears each day based on the date.<br/>Refresh tomorrow for a new one.</div>
        </div>
      )}

      {tab==="qibla"&&(
        <div className="screen-enter">
          <Cd s={{marginBottom:14,textAlign:"center"}}>
            <div style={{color:C.gold,fontSize:13,fontWeight:700,marginBottom:16}}>🧭 Qibla Direction</div>
            {loading?<Spinner/>:(
              <>
                <div style={{position:"relative",width:180,height:180,margin:"0 auto 16px",border:`2px solid ${C.gold}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"#031408"}}>
                  {/* Compass */}
                  {["N","E","S","W"].map((d,i)=>(
                    <div key={d} style={{position:"absolute",color:C.creamDi,fontSize:11,fontWeight:700,...[{top:6,left:"50%",transform:"translateX(-50%)"},{right:6,top:"50%",transform:"translateY(-50%)"},{bottom:6,left:"50%",transform:"translateX(-50%)"},{left:6,top:"50%",transform:"translateY(-50%)"}][i]}}>{d}</div>
                  ))}
                  {/* Qibla needle */}
                  <div style={{position:"absolute",width:4,height:80,background:`linear-gradient(${C.goldHi},${C.gold})`,borderRadius:2,transformOrigin:"bottom center",transform:`rotate(${(qibla?.bearing||292)-180}deg)`,bottom:"50%",left:"calc(50% - 2px)",boxShadow:`0 0 8px ${C.gold}`}}/>
                  <div style={{position:"absolute",width:10,height:10,borderRadius:"50%",background:C.gold}}/>
                  {/* Kaaba icon */}
                  <div style={{position:"absolute",fontSize:16,transform:`rotate(${qibla?.bearing||292}deg) translateY(-55px)`,transformOrigin:"0 0"}}>🕋</div>
                </div>
                <div style={{color:C.gold,fontSize:32,fontWeight:900,marginBottom:4}}>{qibla?.bearing||292}°</div>
                <div style={{color:C.creamDi,fontSize:13}}>from North (clockwise)</div>
                <div style={{color:C.txtDi,fontSize:11,marginTop:8}}>{qibla?.lat?"Based on your GPS location":"Default: Mumbai location"}</div>
              </>
            )}
          </Cd>
          <Cd>
            <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:8}}>How to use:</div>
            {["Hold your phone flat and level","Turn until the needle points to 🕋","That direction is Qibla","Use a physical compass for best accuracy"].map((t,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:6}}>
                <span style={{color:C.gold,fontSize:12}}>{i+1}.</span>
                <span style={{color:C.creamDi,fontSize:12}}>{t}</span>
              </div>
            ))}
          </Cd>
        </div>
      )}
    </div>

   🔍 SEARCH SCREEN
══════════════════════════════════════════════════════ */
function SearchScreen({go,events,ledger,setEvt}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState({members:[],events:[],ledger:[]});

  useEffect(()=>{
    if(q.trim().length<2){setResults({members:[],events:[],ledger:[]});return;}
    const ql=q.toLowerCase();
    setResults({
      members:JAMAAT.members.filter(m=>m.en.toLowerCase().includes(ql)||m.name.includes(q)||m.city.toLowerCase().includes(ql)),
      events:events.filter(e=>e.en.toLowerCase().includes(ql)||e.title.includes(q)||e.venue.toLowerCase().includes(ql)),
      ledger:ledger.filter(l=>l.en.toLowerCase().includes(ql)||l.name.includes(q)),
    });
  },[q]);

  const total=results.members.length+results.events.length+results.ledger.length;

  return(
    <div style={{padding:"0 14px 100px",maxWidth:460,margin:"0 auto",animation:"fadeIn .3s ease"}}>
      <div style={{padding:"20px 6px 14px"}}>
        <div style={{color:C.cream,fontSize:22,fontWeight:800}}>🔍 Search</div>
      </div>

      <div style={{position:"relative",marginBottom:16}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search members, events, history…" autoFocus
          style={{width:"100%",background:C.surface,border:`1.5px solid ${q?C.gold:C.border}`,borderRadius:12,padding:"14px 40px 14px 16px",color:C.cream,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",transition:"border-color .2s"}}/>
        {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.creamDi,cursor:"pointer",fontSize:18}}>×</button>}
      </div>

      {q.length<2&&(
        <div style={{textAlign:"center",padding:"48px 20px"}}>
          <div style={{fontSize:48,marginBottom:12}}>🔍</div>
          <div style={{color:C.creamDi,fontSize:14}}>Type 2+ characters to search</div>
          <div style={{color:C.txtDi,fontSize:12,marginTop:6}}>Members · Events · Jamaat History</div>
        </div>
      )}

      {q.length>=2&&total===0&&<div style={{textAlign:"center",padding:"48px 20px",color:C.creamDi}}>No results for "{q}"</div>}

      {results.members.length>0&&(
        <>
          <div style={{color:C.gold,fontSize:11,letterSpacing:1,marginBottom:8,marginTop:4}}>👥 MEMBERS ({results.members.length})</div>
          {results.members.map(m=>(
            <Cd key={m.id} s={{marginBottom:8,padding:12,cursor:"pointer"}} onClick={()=>go("jamaat")}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{position:"relative"}}><div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${C.green},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:C.cream}}>{m.en[0]}</div></div>
                <div>
                  <div style={{color:C.cream,fontSize:13,fontWeight:700}}>{m.en}</div>
                  <div style={{color:C.txtDi,fontSize:11,marginTop:1}}>{m.city} · {m.verified?"✓ Verified":"Unverified"}</div>
                </div>
              </div>
            </Cd>
          ))}
        </>
      )}

      {results.events.length>0&&(
        <>
          <div style={{color:C.gold,fontSize:11,letterSpacing:1,marginBottom:8,marginTop:12}}>🎪 EVENTS ({results.events.length})</div>
          {results.events.map(e=>(
            <Cd key={e.id} s={{marginBottom:8,padding:12,cursor:"pointer"}} onClick={()=>{setEvt(e);go("eventDetail");}}>
              <div style={{color:C.cream,fontSize:13,fontWeight:700,direction:"rtl",marginBottom:2}}>{e.title}</div>
              <div style={{color:C.creamDi,fontSize:11}}>{e.venue} · {e.date}</div>
            </Cd>
          ))}
        </>
      )}

      {results.ledger.length>0&&(
        <>
          <div style={{color:C.gold,fontSize:11,letterSpacing:1,marginBottom:8,marginTop:12}}>📜 HISTORY ({results.ledger.length})</div>
          {results.ledger.map(l=>(
            <Cd key={l.id} s={{marginBottom:8,padding:12,cursor:"pointer"}} onClick={()=>go("ledger")}>
              <div style={{color:C.cream,fontSize:13,fontWeight:700,direction:"rtl",marginBottom:2}}>{l.name}</div>
              <div style={{color:C.creamDi,fontSize:11}}>{l.en} · {l.start} → {l.end}</div>
            </Cd>
          ))}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   🏗️ CREATE JAMAAT SCREEN (Admin/Amir)
══════════════════════════════════════════════════════ */
function CreateJamaatScreen({go,user,showToast}){
  const [name,setName]=useState("");
  const [nameUr,setNameUr]=useState("");
  const [amir,setAmir]=useState(user.en);
  const [amirPhone,setAmirPhone]=useState(user.phone||"");
  const [departure,setDeparture]=useState("");
  const [returning,setReturning]=useState("");
  const [location,setLocation]=useState("");
  const [pincode,setPincode]=useState("");
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);

  const valid=name.trim()&&amir.trim()&&departure&&returning&&location.trim()&&pincode.length===6;

  const create=async()=>{
    setLoading(true);
    const jamaatData={
      id:"j_"+Date.now(),
      en:name.trim(), name:nameUr.trim()||name.trim(),
      amir_name:amir.trim(), amir_phone:amirPhone,
      departure, returning, location:location.trim(),
      pincode, status:"active",
      created_by:user.id, created_at:new Date().toISOString(),
    };
    if(BACKEND_READY){
      await _sb.from("jamaats").upsert(jamaatData).catch(e=>console.warn("Jamaat save:",e));
    }
    const existing=JSON.parse(localStorage.getItem("jamat_jamaats")||"[]");
    existing.push(jamaatData);
    localStorage.setItem("jamat_jamaats",JSON.stringify(existing));
    await DB.logNotification({type:"audit",sender_name:user.en,message:`New Jamaat created: ${name}`,channel:"app",lang:"en"});
    setLoading(false);setDone(true);
    showToast("Jamaat created successfully!","success");
  };

  if(done) return(
    <div style={{padding:"24px 14px",maxWidth:460,margin:"0 auto",textAlign:"center"}}>
      <BackBtn fn={()=>go("admin")} label="Admin"/>
      <div style={{paddingTop:40}}>
        <div style={{fontSize:56,marginBottom:16}}>🕌</div>
        <div style={{color:C.greenBr,fontSize:22,fontWeight:700}}>Jamaat Created!</div>
        <Cd s={{marginTop:20,textAlign:"left",borderColor:C.green}}>
          {[["Name",name],["Amir",amir],["Departure",departure],["Location",location],["Pincode",pincode]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{color:C.creamDi,fontSize:13}}>{k}</span><span style={{color:C.cream,fontSize:13,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </Cd>
        <Btn fn={()=>{setDone(false);setName("");setNameUr("");setLocation("");setPincode("");setDeparture("");setReturning("");}} v="outline" s={{marginTop:20}} ch="Create Another"/>
      </div>
    </div>
  );

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto",animation:"fadeIn .3s ease"}}>
      <BackBtn fn={()=>go(user.role==="state_admin"?"admin":"dashboard")} label="Back"/>
      <div style={{padding:"14px 0 16px"}}>
        <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>نئی جماعت</div>
        <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Create New Jamaat</div>
      </div>
      <Inp label="Jamaat Name (English) *" val={name} set={setName} ph="e.g. Tabligh Jamaat Maharashtra"/>
      <Inp label="جماعت کا نام (اردو)" val={nameUr} set={setNameUr} ph="e.g. جماعت تبلیغ مہاراشٹرہ"/>
      <Inp label="Amir Name *" val={amir} set={setAmir} ph="Full name of Amir"/>
      <Inp label="Amir Phone *" val={amirPhone} set={setAmirPhone} ph="+91 98765 43210" type="tel"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:0}}>
        <Inp label="Departure Date *" val={departure} set={setDeparture} ph="e.g. 15 Apr 2025"/>
        <Inp label="Return Date *" val={returning} set={setReturning} ph="e.g. 15 May 2025"/>
      </div>
      <Inp label="Starting Location *" val={location} set={setLocation} ph="e.g. Pune Markaz"/>
      <Inp label="Pincode *" val={pincode} set={v=>setPincode(v.replace(/\D/g,"").slice(0,6))} ph="411001" max={6} kb="numeric"/>
      {loading?<Spinner/>:<Btn fn={create} v="gold" dis={!valid} ch="🕌 Create Jamaat"/>}
    </div>
  );
}

function SettingsScreen({go,user,onRoleChange,showToast}){

  const [notifSMS,setNotifSMS]=useState(true);

    showToast(`Language: ${l==="ur"?"Urdu / اردو":l==="hi"?"Hindi / हिंदी":"English"}`,"success");
  };

  const requestPush=async()=>{
    const ok=await window.requestPushPermission?.();
    setPushEnabled(ok);

function FeedbackScreen({go,user,showToast}){
  const [type,setType]=useState("feedback");

    if(msg.trim().length<10){showToast("Please write at least 10 characters","error");return;}
    setLoading(true);
    await DB.logNotification({type:"feedback",sender_id:user.id,sender_name:user.en,message:`[${type.toUpperCase()}][${rating}★] ${msg}`,channel:"app",lang:"en"});
    if(BACKEND_READY) await _sb.from("notification_logs").insert({type:"user_feedback",sender_id:user.id,sender_name:user.en,message:`${type}: ${msg} (${rating}★)`,channel:"app",sent_at:new Date().toISOString()}).catch(()=>{});
    setLoading(false);setSent(true);

  if(sent) return(

      </div>
    </div>
  );

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto",animation:"fadeIn .3s ease"}}>
      <BackBtn fn={()=>go("settings")} label="Settings"/>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["feedback","💡 Feedback"],["bug","🐛 Bug Report"],["support","🆘 Support"]].map(([t,l])=>(

        ))}

      <Cd s={{marginBottom:14}}>

          {[1,2,3,4,5].map(s=>(
            <button key={s} onClick={()=>setRating(s)} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",opacity:s<=rating?1:0.3,transition:"opacity .15s"}}>⭐</button>
          ))}

      </Cd>
      <div style={{marginBottom:16}}>
        <div style={{color:C.creamDi,fontSize:13,marginBottom:6,fontWeight:500}}>Your message *</div>

/* ══════════════════════════════════════════════════════
   👨‍👩‍👧 FAMILY CONTACTS SCREEN (Multiple contacts)
══════════════════════════════════════════════════════ */
function FamilyContactsScreen({user,go,showToast,onUpdate}){
  const [contacts,setContacts]=useState(()=>{
    const saved=localStorage.getItem("jamat_family_"+user.id);
    if(saved) return JSON.parse(saved);
    return user.family?[user.family]:[];
  });
  const [adding,setAdding]=useState(false);
  const [name,setName]=useState("");
  const [phone,setPhone]=useState("");
  const [rel,setRel]=useState("Wife");

  const save=(list)=>{
    setContacts(list);
    localStorage.setItem("jamat_family_"+user.id, JSON.stringify(list));
    onUpdate&&onUpdate(list[0]);
  };

  const add=()=>{
    if(name.trim().length<2){showToast("Enter name","error");return;}
    if(phone.replace(/[^0-9]/g,"").length<10){showToast("Enter valid phone","error");return;}
    if(contacts.length>=3){showToast("Maximum 3 family contacts allowed","error");return;}
    const newContact={name:name.trim(),phone:phone.trim(),rel};
    save([...contacts,newContact]);
    setName("");setPhone("");setAdding(false);
    showToast(`${name} added as family contact!`,"success");
  };

  const remove=(i)=>{
    const updated=contacts.filter((_,idx)=>idx!==i);
    save(updated);showToast("Contact removed","success");
  };

  return(
    <div style={{padding:"20px 14px 100px",maxWidth:460,margin:"0 auto",animation:"fadeIn .3s ease"}}>
      <BackBtn fn={()=>go("profile")} label="Profile"/>
      <div style={{padding:"14px 0 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{color:C.gold,fontSize:12,direction:"rtl",marginBottom:2}}>خاندانی رابطے</div>
          <div style={{color:C.cream,fontSize:20,fontWeight:800}}>Family Contacts</div>

/* ══════════════════════════════════════════════════════
   📅 EVENT COUNTDOWN + WAITLIST
   Enhanced Event Detail with countdown timer
══════════════════════════════════════════════════════ */
function EventCountdown({eventDate}){
  const [timeLeft,setTimeLeft]=useState({days:0,hours:0,mins:0});
  useEffect(()=>{
    const calc=()=>{
      // Parse event date (e.g. "May 10-12, 2025")
      const parts=eventDate.split(",");
      const yearStr=parts[parts.length-1]?.trim();
      const monthDay=parts[0]?.split(" ");
      const month=monthDay?.[0];
      const day=parseInt(monthDay?.[1]?.split("–")[0]||"1");
      const target=new Date(`${month} ${day}, ${yearStr}`);
      const now=new Date();
      const diff=target-now;
      if(diff>0){
        setTimeLeft({days:Math.floor(diff/86400000),hours:Math.floor((diff%86400000)/3600000),mins:Math.floor((diff%3600000)/60000)});
      }
    };
    calc();
    const t=setInterval(calc,60000);
    return()=>clearInterval(t);
  },[eventDate]);

  if(timeLeft.days===0&&timeLeft.hours===0) return null;
  return(
    <div style={{background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",gap:16,justifyContent:"center",alignItems:"center"}}>
      {[["days","Days"],["hours","Hrs"],["mins","Min"]].map(([k,l])=>(
        <div key={k} style={{textAlign:"center"}}>
          <div style={{color:C.goldHi,fontSize:24,fontWeight:900,lineHeight:1}}>{timeLeft[k]}</div>
          <div style={{color:C.gold,fontSize:9,letterSpacing:1,marginTop:2}}>{l.toUpperCase()}</div>
        </div>
      ))}
      <div style={{color:C.gold,fontSize:12,marginLeft:4}}>until event</div>
    </div>
  );
}

  const [userPhoto,setUserPhoto]=useState(null);
  const [screen,setScreen]=useState("dashboard");
  const [selEvt,setSelEvt]=useState(null);
  const [showSOS,setShowSOS]=useState(false);
  const [events,setEvents]=useState(EVENTS_INIT);
  const [regsLoaded,setRegsLoaded]=useState(false);
  const [notifCount,setNotifCount]=useState(0);
  const [selMember,setSelMember]=useState(null);
  const [ledger,setLedger]=useState(LEDGER_INIT);
  const [toast,setToast]=useState(null);
  const online=useOnline();

  useEffect(()=>{
    const s=document.createElement("style");
    s.textContent=`
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

      body{font-family:'Plus Jakarta Sans',system-ui,sans-serif}
      ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:${C.bg}}
      ::-webkit-scrollbar-thumb{background:${C.border};border-radius:99px}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
      @keyframes dot{from{transform:scale(.7);opacity:.4}to{transform:scale(1);opacity:1}}
      @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(5px)}}
      @keyframes sosGlow{0%,100%{box-shadow:0 4px 16px ${C.red}66}50%{box-shadow:0 4px 28px ${C.redHi}aa}}
      @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
      @keyframes grow{from{width:0}to{width:100%}}
      input:focus,textarea:focus{border-color:${C.gold}!important;outline:none}
      button:active{opacity:.82}
    `;
    document.head.appendChild(s);
    return()=>document.head.removeChild(s);
  },[]);

  const showToast=useCallback((msg,type="success")=>{setToast({msg,type,id:Date.now()});},[]);

  const go=useCallback((s)=>{
    setScreen(s);

  const handleLogin=(u)=>{setUser(u);setPhase("tc");setUserPhoto(DB.getPhoto(u.id));};
  const handleTC=()=>setPhase(user.family?"app":"family");

  useEffect(()=>{
    if(user&&!regsLoaded){

    setPhase("app");

    const welcomeMsg=DB.buildMessage("welcome",{name:updatedUser.en},updatedUser.lang||"ur");

      type:"welcome",sender_id:updatedUser.id,sender_name:updatedUser.en,
      message:welcomeMsg,channel:"push",lang:updatedUser.lang||"ur",

  const handleRoleChange=(u)=>{setUser(u);go("dashboard");};

    await DB.registerEvent(user?.id||"demo", evId);

      setLedger(p=>[newEntry,...p]);

  if(phase==="tc")return <TC user={user} onAccept={handleTC}/>;

  if(showSOS)return <SOS user={user} onBack={()=>setShowSOS(false)}/>;

  const noNav=["qr","location","broadcast","sos","qrscan"].includes(screen);

    if(screen==="health")return <HealthScreen user={user} go={go} showToast={showToast}/>;
    if(screen==="broadcast")return <BroadcastScreen user={user} go={go} showToast={showToast}/>;
    if(screen==="islamic")return <IslamicScreen go={go} user={user}/>;
    if(screen==="analytics")return <AnalyticsScreen user={user} go={go} ledger={ledger}/>;
    if(screen==="notifications")return <NotificationsScreen go={go} user={user} notifCount={notifCount} clearNotifs={()=>setNotifCount(0)}/>;

            </button>
            <Bdg v={user.role==="amir"?"gold":user.role==="state_admin"?"red":"green"}
              ch={user.role==="amir"?"Amir":user.role==="state_admin"?"Admin":"Member"}/>
            <div onClick={()=>go("profile")} style={{width:30,height:30,borderRadius:"50%",border:`1.5px solid ${C.gold}`,background:userPhoto?`url(${userPhoto}) center/cover`:`linear-gradient(135deg,${C.green},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:C.cream,cursor:"pointer"}}>
              {!userPhoto&&user.en[0]}
            </div>
          </div>
        </div>
        <div style={{paddingBottom:noNav?0:80}}>{renderScreen()}</div>
        {!noNav&&<BottomNav active={screen} go={go}/>}
        {!noNav&&!showSOS&&(
          <button onClick={()=>setShowSOS(true)}
            style={{position:"fixed",right:16,bottom:80,width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${C.redHi},${C.red})`,border:"none",color:"#fff",fontSize:18,cursor:"pointer",zIndex:99,animation:"sosGlow 2s ease-in-out infinite",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>
            🆘
          </button>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
